<!DOCTYPE html>

    <style>
        :root { --primary: #01c38d; --bg: #131927; --card: #1e2640; --text: #ffffff; --danger: #ff4a4a; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 600px; width: 100%; }
        h1, h2 { text-align: center; color: var(--primary); margin-bottom: 5px; }
        .group-header-active { background: #1a2238; color: var(--primary); font-weight: bold; padding: 12px; border-radius: 6px; margin: 15px 0; text-align: center; font-size: 18px; border: 2px solid var(--primary); }
        .card { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); margin-bottom: 20px; }
        input, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 6px; border: none; box-sizing: border-box; }
        input[type="text"] { background: #2a3558; color: white; font-size: 16px; }
        button { background: var(--primary); color: var(--bg); font-weight: bold; cursor: pointer; font-size: 16px; }
        button:disabled { background: #4a5568; color: #a0aec0; cursor: not-allowed; box-shadow: none !important; }
        button:hover:not(:disabled) { opacity: 0.9; }
        .hidden { display: none; }
        .match-row { display: flex; align-items: center; justify-content: space-between; margin: 12px 0; padding-bottom: 8px; border-bottom: 1px solid #2a3558; }
        .match-info { display: flex; flex-direction: column; width: 65%; }
        .match-teams { font-size: 14px; font-weight: 500; }
        .match-date { font-size: 11px; color: #8a99ad; margin-top: 3px; }
        .locked-text { color: var(--danger); font-weight: bold; }
        .score-inputs { display: flex; gap: 8px; align-items: center; }
        .score-inputs input { width: 42px; text-align: center; margin: 0; padding: 6px; background: #2a3558; color: white; border: none; border-radius: 4px; font-size: 16px; }
        .score-inputs input:disabled { background: #131927; color: #6c7a9c; cursor: not-allowed; }
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; min-width: 1500px; }
        th, td { padding: 6px; text-align: center; border-bottom: 1px solid #2a3558; font-size: 11px; }
        th { color: var(--primary); background: #1a2238; font-size: 9px; }
        .progress-bar { display: flex; justify-content: space-between; margin-bottom: 15px; background: #1a2238; padding: 8px; border-radius: 6px; font-size: 11px; font-weight: bold; }
        .progress-step { color: #6c7a9c; }
        .progress-step.active { color: var(--primary); }
    </style>
</head>

    function saveNick() {
        const nick = document.getElementById('nick-input').value.trim();
        if (nick.length < 3) return alert('Nick musi mieД‡ min. 3 znaki!');
        localStorage.setItem('typerNick', nick);
        showApp(nick);
    }

    function showApp(nick) {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('app-screen').classList.remove('hidden');
        document.getElementById('user-display').innerText = nick;
        renderProgressBar();
        renderActiveGroup();
        loadAllScores();
    }

    function renderProgressBar() {
        const bar = document.getElementById('steps-bar');
        bar.innerHTML = "";
        groupsOrder.forEach((g, idx) => {
            const span = document.createElement('span');
            span.className = `progress-step ${idx === currentGroupIndex ? 'active' : ''}`;
            span.innerText = `GR. ${g}`;
            bar.appendChild(span);
        });
    }

    function renderActiveGroup() {
        const currentLetter = groupsOrder[currentGroupIndex];
        document.getElementById('group-title').innerText = `рџЏ† FAZA GRUPOWA вЂ” GRUPA ${currentLetter}`;
        
        const container = document.getElementById('matches-list');
        container.innerHTML = "";
        const now = new Date();

        const groupMatches = allMatches.filter(m => m.group === currentLetter);

        groupMatches.forEach((match, index) => {
            const lockTime = new Date(match.lock);
            const isLocked = now >= lockTime;

            const div = document.createElement('div');
            div.className = "match-row";
            div.setAttribute('data-id', match.id);
            div.setAttribute('data-locked', isLocked);
            
            div.innerHTML = `
                <div class="match-info">
                    <span class="match-teams">${match.t1} - ${match.t2}</span>
                    <span class="match-date">${isLocked ? '<span class="locked-text">рџ”’ ZABLOKOWANY</span>' : 'вЏ° Start PL: ' + match.lock.replace('T', ' ')}</span>
                </div>
                <div class="score-inputs">
                    <input type="number" class="home-team" id="home-${match.id}" min="0" placeholder="-" ${isLocked ? 'disabled' : ''} oninput="handleHomeInput('${match.id}')">
                    <span>:</span>
                    <input type="number" class="away-team" id="away-${match.id}" min="0" placeholder="-" ${isLocked ? 'disabled' : ''} oninput="validateGroupCompletion()">
                </div>
            `;
            container.appendChild(div);
        });

        validateGroupCompletion();
    }

    // Funkcja obsЕ‚ugujД…ca automatyczny skok (auto-tab)
    function handleHomeInput(matchId) {
        const homeInput = document.getElementById(`home-${matchId}`);
        const awayInput = document.getElementById(`away-${matchId}`);
        
        // JeЕ›li wpisano chociaЕј jednД… cyfrД™, przenieЕ› kursor do pola obok
        if (homeInput.value !== "") {
            awayInput.focus();
        }
        
        validateGroupCompletion();
    }

            const isLocked = row.getAttribute('data-locked') === "true";
            if (!isLocked) {
                const home = row.querySelector('.home-team').value;
                const away = row.querySelector('.away-team').value;
                if (home === "" || away === "") {
                    allFilled = false;
                }
            }
        });

        const btn = document.getElementById('submit-btn');
        if (allFilled) {
            btn.removeAttribute('disabled');
            const isLast = currentGroupIndex === groupsOrder.length - 1;
            btn.innerText = isLast ? "рџ’ѕ Zapisz i ZakoЕ„cz Typowanie!" : `рџ’ѕ Zapisz i przejdЕє do Grupy ${groupsOrder[currentGroupIndex + 1]}`;
        } else {
            btn.setAttribute('disabled', 'true');
            btn.innerText = "Wpisz wszystkie wyniki tej grupy, aby przejЕ›Д‡ dalej";
        }
    }

    async function submitCurrentGroup() {
        const nick = localStorage.getItem('typerNick');
        const rows = document.querySelectorAll('.match-row');
        const updateData = {};

        rows.forEach(row => {
            const id = row.getAttribute('data-id');
            const isLocked = row.getAttribute('data-locked') === "true";
            if (!isLocked) {
                const home = row.querySelector('.home-team').value;
                const away = row.querySelector('.away-team').value;
                updateData[id] = `${home}:${away}`;
            }
        });

        try {
            const resCheck = await fetch(`${API_URL}/search?Gracz=${nick}`);
            const existing = await resCheck.json();

            if (existing.length > 0) {
                await fetch(`${API_URL}/Gracz/${nick}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: updateData })
                });
            } else {
                updateData["Gracz"] = nick;
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: [updateData] })
                });
            }

            if (currentGroupIndex < groupsOrder.length - 1) {
                alert(`Grupa ${groupsOrder[currentGroupIndex]} zapisana pomyЕ›lnie! Idziemy dalej. рџљЂ`);
                currentGroupIndex++;
                renderProgressBar();
                renderActiveGroup();
                loadAllScores();
                window.scrollTo({ top: 0, behavior: 'smooth' }); // Automatyczny powrГіt na gГіrД™ strony
            } else {
                alert("Genialnie! Wszystkie grupy od A do L zostaЕ‚y pomyЕ›lnie obstawione i zapisane w bazie! рџЋ‰");
                loadAllScores();
            }
        } catch (error) {
            alert('BЕ‚Д…d poЕ‚Д…czenia z bazД… danych SheetDB. SprГіbuj ponownie.');
        }
    }

    async function loadAllScores() {
        const thead = document.getElementById('table-head');
        const tbody = document.getElementById('table-body');
        
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            
            thead.innerHTML = "";
            const trHead = document.createElement('tr');
            trHead.innerHTML = "<th style='position:sticky; left:0; background:#1a2238; z-index:2;'>Gracz</th>";
            
            allMatches.forEach(m => {
                const name1 = m.t1.replace(/[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|[\u2600-\u27BF]/g, '').trim().substring(0,3).toUpperCase();
                const name2 = m.t2.replace(/[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|[\u2600-\u27BF]/g, '').trim().substring(0,3).toUpperCase();
                trHead.innerHTML += `<th>${name1}-${name2}</th>`;
            });
            thead.appendChild(trHead);

            tbody.innerHTML = "";
            data.forEach(row => {
                if (!row.Gracz) return;
                const tr = document.createElement('tr');
                let rowHtml = `<td style="font-weight:bold; color:#01c38d; position:sticky; left:0; background:#131927; z-index:1;">${row.Gracz}</td>`;
                
                allMatches.forEach(m => {
                    rowHtml += `<td>${row[m.id] || '-'}</td>`;
                });
                tr.innerHTML = rowHtml;
                tbody.appendChild(tr);
            });
        } catch (error) {
            tbody.innerHTML = "<tr><td>Oczekiwanie na pierwsze zapisy w bazie...</td></tr>";
        }
    }
</script>
