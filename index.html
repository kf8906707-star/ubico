        h1, h2 { text-align: center; color: var(--primary); margin-bottom: 5px; }
        .group-header-active { background: #1a2238; color: var(--primary); font-weight: bold; padding: 12px; border-radius: 6px; margin: 15px 0; text-align: center; font-size: 18px; border: 2px solid var(--primary); }
        .card { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); margin-bottom: 20px; box-sizing: border-box; }
        input, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 6px; border: none; box-sizing: border-box; }
        input[type="text"] { background: #2a3558; color: white; font-size: 16px; text-align: center; }
        button { background: var(--primary); color: var(--bg); font-weight: bold; cursor: pointer; font-size: 16px; }
        button:disabled { background: #4a5568; color: #a0aec0; cursor: not-allowed; box-shadow: none !important; }
        button:hover:not(:disabled) { opacity: 0.9; }
        .hidden { display: none !important; }
        
        /* Ekran ładowania (Loader) */
        #loading-screen { text-align: center; padding: 40px 20px; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); width: 42px; height: 42px; border-radius: 50%; border-left-color: var(--primary); animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .match-row { display: flex; align-items: center; justify-content: space-between; margin: 12px 0; padding-bottom: 8px; border-bottom: 1px solid #2a3558; }
        .match-info { display: flex; flex-direction: column; width: 65%; }
        .match-teams { font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .match-date { font-size: 11px; color: #8a99ad; margin-top: 3px; }
        .locked-text { color: var(--danger); font-weight: bold; }
        .submitted-text { color: var(--primary); font-weight: bold; }
        .score-inputs { display: flex; gap: 8px; align-items: center; }
        .score-inputs input { width: 42px; text-align: center; margin: 0; padding: 6px; background: #2a3558; color: white; border: none; border-radius: 4px; font-size: 16px; }
        .score-inputs input:disabled { background: #131927; color: #6c7a9c; cursor: not-allowed; }
        
        .success-box { background: rgba(1, 195, 141, 0.1); border: 2px dashed var(--primary); color: var(--primary); text-align: center; padding: 15px; border-radius: 8px; margin-top: 25px; font-weight: bold; font-size: 16px; }
        
        img.emoji { height: 1.2em; width: 1.2em; margin: 0 .15em; vertical-align: -0.2em; }
        
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; min-width: 1600px; }
        th, td { padding: 12px 8px; text-align: center; border-bottom: 1px solid #2a3558; font-size: 12px; }
        th { color: var(--primary); background: #1a2238; font-weight: 600; vertical-align: middle; }
        .th-match-header { font-size: 11px; font-weight: bold; color: white; white-space: nowrap; min-width: 90px; text-align: center; letter-spacing: 0.5px; display: flex; align-items: center; justify-content: center; gap: 4px; }
        
        .cell-exact { background-color: #028a5a !important; color: white !important; font-weight: bold; } 
        .cell-trend { background-color: #b8860b !important; color: white !important; font-weight: bold; } 
        .cell-miss { background-color: #8b0000 !important; color: #ffcccc !important; } 

        .leaderboard-table { min-width: 100% !important; }
        .leaderboard-table th, .leaderboard-table td { padding: 10px; font-size: 14px; }
        .leaderboard-row:nth-child(1) { background: rgba(255, 215, 0, 0.15); } 
        .rank-badge { font-weight: bold; display: inline-block; width: 24px; height: 24px; line-height: 24px; border-radius: 50%; background: #2a3558; color: white; text-align: center; font-size: 12px; }
        .leaderboard-row:nth-child(1) .rank-badge { background: #ffd700; color: #131927; }
        .leaderboard-row:nth-child(2) .rank-badge { background: #c0c0c0; color: #131927; }
        .leaderboard-row:nth-child(3) .rank-badge { background: #cd7f32; color: #131927; }
        .stats-span { font-size: 11px; color: #8a99ad; margin-left: 5px; font-weight: normal; }

        .progress-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; background: #1a2238; padding: 8px; border-radius: 6px; margin-bottom: 15px; box-sizing: border-box; }
        .progress-step { color: #6c7a9c; background: #131927; cursor: pointer; padding: 10px 0; border-radius: 4px; transition: background 0.2s; text-align: center; font-size: 14px; font-weight: bold; }
        .progress-step:hover { background: #2a3558; color: white; }
        .progress-step.active { color: var(--bg); background: var(--primary); }

        .table-toggle-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .toggle-btn { background: #1a2238; color: #8a99ad; border: 1px solid #2a3558; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: bold; cursor: pointer; width: auto; margin: 0; }
        .toggle-btn.active { background: var(--primary); color: var(--bg); border-color: var(--primary); }

            .progress-step { padding: 6px 0; font-size: 12px; }
            .logo-container img { max-width: 240px; }
        }
    </style>
</head>

    function showLoading(show) {
        document.getElementById('loading-screen').className = show ? "card" : "card hidden";
    }

    async function loadAllScores() {
        showLoading(true);
        try {
            const response = await fetch(`${API_URL}?akcja=pobierzWszystko&arkusz=${KEY_NAME}`);
            const data = await response.json();
            existingDatabaseRows = data;

            if (currentUser) {
                fillLocalDraftFromDatabase();
                updateGroupNav();
                renderActiveGroup();
            } else {
                document.getElementById('login-screen').className = "card";
            }
            renderScoresTable();
        } catch (error) {
            console.error("Błąd ładowania danych:", error);
            alert("Nie udało się pobrać danych z Google Sheets.");
        } finally {
            showLoading(false);
        }
    }

    function loginUser() {
        const input = document.getElementById('nick-input').value.trim();
        if (!input) {
            alert("Podaj swój Nick!");
            return;
        }
        currentUser = input;
        document.getElementById('user-display').innerText = currentUser;
        document.getElementById('login-screen').className = "card hidden";
        document.getElementById('app-screen').className = "";

        fillLocalDraftFromDatabase();
        updateGroupNav();
        renderActiveGroup();
    }

    function isGroupSubmittedByPlayer(groupLetter) {
        const userRow = existingDatabaseRows.find(r => r.gracz && r.gracz.trim().toLowerCase() === currentUser.toLowerCase());
        if (!userRow) return false;

        if (groupLetter === "STRZELCY") {
            return userRow["fantasy_strzelec"] && userRow["fantasy_strzelec"] !== "" && userRow["fantasy_strzelec"] !== "-";
        }

        const groupMatches = allMatches.filter(m => m.group === groupLetter);
        if(groupMatches.length === 0) return false;

        let allFound = true;
        groupMatches.forEach(m => {
            const matchKey = m.id.toLowerCase();
            if (!userRow[matchKey] || userRow[matchKey] === "" || userRow[matchKey] === "-") {
                allFound = false;
            }
        });
        return allFound;
    }

    function fillLocalDraftFromDatabase() {
        localDraftScores = {};
        const userRow = existingDatabaseRows.find(r => r.gracz && r.gracz.trim().toLowerCase() === currentUser.toLowerCase());
        if (!userRow) return;

        if (userRow["fantasy_strzelec"]) {
            localDraftScores["fantasy_strzelec"] = userRow["fantasy_strzelec"];
        }

        allMatches.forEach(m => {
            const matchKey = m.id.toLowerCase();
            const val = userRow[matchKey];
            if (val && val.includes(":")) {
                const parts = val.split(":");
                localDraftScores[`home-${m.id}`] = parts[0].trim();
                localDraftScores[`away-${m.id}`] = parts[1].trim();
            }
        });
    }

    function updateGroupNav() {
        const navContainer = document.getElementById('steps-bar');
        navContainer.innerHTML = "";
        if (POKAZUJ_FAZE_PUCHAROWA) {
            navContainer.classList.add('pucharowa-grid');
        } else {
            navContainer.classList.remove('pucharowa-grid');
        }
        
        const is116Submitted = isGroupSubmittedByPlayer("1/16");

        groupsOrder.forEach((gKey, idx) => {
            if (gKey === "STRZELCY" && !is116Submitted) return;

            const stepDiv = document.createElement('div');
            const isDone = isGroupSubmittedByPlayer(gKey);
            stepDiv.className = `progress-step ${idx === currentGroupIndex ? 'active' : ''}`;
            stepDiv.innerText = (isDone ? "✅ " : "") + gKey;
            stepDiv.onclick = () => {
                currentGroupIndex = idx;
                updateGroupNav();
                renderActiveGroup();
            };
            navContainer.appendChild(stepDiv);
        });
    }

    function renderActiveGroup() {
        const matchesContainer = document.getElementById('matches-list');
        const currentLetter = groupsOrder[currentGroupIndex];
        
        document.getElementById('group-title').innerText = currentLetter === "STRZELCY" ? "⚽ SELEKCJA STRZELCA FANTASY" : `FAZA: ${currentLetter}`;

        // --- DEDYKOWANA LOGIKA INTERFEJSU DLA STRZELCÓW FANTASY ---
        if (currentLetter === "STRZELCY") {
            let html = `
                <div style="background: rgba(1, 195, 141, 0.05); padding: 15px; border-radius: 8px; margin-bottom: 15px; text-align: center; border: 1px dashed var(--primary);">
                    <p style="font-size: 13px; color: #aaa; margin: 0 0 10px 0;">Wybierz jedną reprezentację, a następnie wskaż swojego snajpera. Punkty zależą bezpośrednio od jego pozycji na boisku!</p>
                    <div style="margin: 10px 0; padding: 10px; background: #131927; border-radius: 6px; font-weight: bold; font-size:14px;">
                        Twój aktualny wybór: <span id="current-chosen-player" style="color:var(--primary)">${localDraftScores['fantasy_strzelec'] || 'Brak wyboru'}</span>
                    </div>
                </div>
                <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; margin-bottom: 15px;">
            `;
            
            Object.keys(fantasyPlayers).forEach(country => {
                const flag = teamFlags[country] || "";
                html += `
                    <button onclick="toggleFantasyCountry('${country}')" style="background:#2a3558; color:white; padding: 10px; font-size:12px; margin:0; font-weight: bold;">
                        ${flag} ${country}
                    </button>
                `;
            });
            
            html += `</div><div id="fantasy-players-pool"></div>`;
            
            const isLocked = new Date() > new Date("2026-06-29T18:00:00");
            const isSubmitted = isGroupSubmittedByPlayer("STRZELCY");

            if (isSubmitted) {
                html = `<div class="success-box">🔒 Twój strzelec został zatwierdzony i przesłany do bazy danych!</div>` + html;
                document.getElementById('submit-container').innerHTML = "";
            } else if (!isLocked) {
                document.getElementById('submit-container').innerHTML = `
                    <button id="submit-btn" onclick="submitFantasyStrzelec()" class="submit-btn" style="width:100%; margin-top:15px; background:var(--primary); color:var(--bg)">
                        Zatwierdź i Wyślij Strzelca
                    </button>
                `;
            } else {
                html = `<p style="color:var(--danger); text-align:center; font-weight:bold;">Rejestracja strzelców została zablokowana (czas minął)!</p>` + html;
                document.getElementById('submit-container').innerHTML = "";
            }

            matchesContainer.innerHTML = html;
            if(typeof twemoji !== 'undefined') twemoji.parse(matchesContainer, { folder: 'svg', ext: '.svg' });
            return;
        }

        // --- STANDARDOWA LOGIKA DLA FAZ MECZOWYCH ---
        const groupMatches = allMatches.filter(m => m.group === currentLetter);
        matchesContainer.innerHTML = "";

        const isGroupSubmitted = isGroupSubmittedByPlayer(currentLetter);

        if (isGroupSubmitted) {
            const successDiv = document.createElement('div');
            successDiv.className = "success-box";
            successDiv.innerText = "🔒 Typy dla tej fazy zostały pomyślnie wysłane do Google Sheets.";
            matchesContainer.appendChild(successDiv);
        }

        groupMatches.forEach((match, index) => {
            const div = document.createElement('div');
            div.className = "match-row";
            div.setAttribute('data-id', match.id);

            const now = new Date();
            const lockDate = new Date(match.lock);
            const isLocked = now > lockDate || isGroupSubmitted;
            div.setAttribute('data-locked', isLocked ? "true" : "false");

            let statusMessage = "";
            if (isGroupSubmitted) {
                statusMessage = `<span class="submitted-text">Wysłano</span>`;
            } else if (now > lockDate) {
                statusMessage = `<span class="locked-text">Zablokowany (Czas minął)</span>`;
            } else {
                const formattedTime = lockDate.toLocaleDateString('pl-PL', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
                statusMessage = `Koniec typowania: ${formattedTime}`;
            }

            const savedHome = localDraftScores[`home-${match.id}`] || "";
            const savedAway = localDraftScores[`away-${match.id}`] || "";

            const f1 = teamFlags[match.t1] || "";
            const f2 = teamFlags[match.t2] || "";

            let officialResultText = (match.score && match.score !== "") ? ` <b style="color:var(--primary)">[Wynik: ${match.score}]</b>` : "";
            let dopisekPucharowy = POKAZUJ_FAZE_PUCHAROWA ? `<span style="font-size:10px; color:var(--primary); font-weight:bold; text-transform:uppercase; margin-bottom:2px;">${match.id.replace('Mec', 'MECZ ')}</span>` : "";

            const nextMatch = groupMatches[index + 1];
            const nextMatchId = nextMatch ? nextMatch.id : "";

            div.innerHTML = `
                <div class="match-info">
                    ${dopisekPucharowy}
                    <span class="match-teams">${f1} ${match.t1} - ${f2} ${match.t2} ${officialResultText}</span>
                    <span class="match-date">${statusMessage}</span>
                </div>
                <div class="score-inputs">
                    <input type="number" class="home-team" id="home-${match.id}" min="0" placeholder="-" value="${savedHome}" ${isLocked ? 'disabled' : ''} oninput="handleHomeInput('${match.id}')">
                    <span>:</span>
                    <input type="number" class="away-team" id="away-${match.id}" min="0" placeholder="-" value="${savedAway}" ${isLocked ? 'disabled' : ''} oninput="handleAwayInput('${match.id}', '${nextMatchId}')">
                </div>
            `;
            matchesContainer.appendChild(div);
        });

        if(typeof twemoji !== 'undefined') {
            twemoji.parse(matchesContainer, { folder: 'svg', ext: '.svg' });
        }

        if (isGroupSubmitted) {
            document.getElementById('submit-container').innerHTML = "";
        } else {
            document.getElementById('submit-container').innerHTML = `
                <button id="submit-btn" onclick="submitCurrentGroup()" style="margin-top: 25px; font-size: 18px; box-shadow: 0 4px 10px rgba(1, 195, 141, 0.3);" disabled>
                    Wypełnij wszystkie mecze grupy
                </button>
            `;
            validateGroupCompletion();
        }
    }

    function toggleFantasyCountry(country) {
        const pool = document.getElementById('fantasy-players-pool');
        const players = fantasyPlayers[country];
        if (!players) return;

        const roles = {
            "obrona": { title: "🛡️ OBROŃCY", list: [] },

        let html = `<div style="background: var(--card); padding: 15px; border-radius: 8px; margin-top:10px; border:1px solid #2a3558;">`;

        });

        pool.innerHTML = html;
        if(typeof twemoji !== 'undefined') twemoji.parse(pool, { folder: 'svg', ext: '.svg' });
    }

    function selectFantasyPlayer(fullName) {
        localDraftScores['fantasy_strzelec'] = fullName;
        document.getElementById('current-chosen-player').innerText = fullName;
    }

    async function submitFantasyStrzelec() {
        const playerName = localDraftScores['fantasy_strzelec'];
        if (!playerName || playerName === "") {
            alert("Najpierw musisz wybrać jakiegoś piłkarza z listy!");
            return;
        }

        showLoading(true);
        const updateData = {
            akcja: "zapiszTypy",
            gracz: currentUser,
            "fantasy_strzelec": playerName
        };

        try {
            await fetch(API_URL, {
                method: "POST",
                mode: "cors",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify(updateData)
            });
            alert("Twój strzelec Fantasy został pomyślnie wysłany!");
            loadAllScores();
        } catch(e) {
            console.error(e);
            alert("Błąd zapisu danych.");
        } finally {
            showLoading(false);
        }
    }

    function handleHomeInput(matchId) {
        const homeVal = document.getElementById(`home-${matchId}`).value;
        localDraftScores[`home-${matchId}`] = homeVal;
        validateGroupCompletion();
    }

    function handleAwayInput(matchId, nextMatchId) {
        const awayVal = document.getElementById(`away-${matchId}`).value;
        localDraftScores[`away-${matchId}`] = awayVal;
        validateGroupCompletion();

        if (awayVal !== "" && nextMatchId) {
            const nextHomeInput = document.getElementById(`home-${nextMatchId}`);
            if (nextHomeInput && !nextHomeInput.disabled && nextHomeInput.value === "") {
                nextHomeInput.focus();
            }
        }
    }

    function validateGroupCompletion() {
        const currentLetter = groupsOrder[currentGroupIndex];
        if (currentLetter === "STRZELCY") return;

        const groupMatches = allMatches.filter(m => m.group === currentLetter);
        let allFilled = true;

        groupMatches.forEach(m => {
            const homeVal = localDraftScores[`home-${m.id}`];
            const awayVal = localDraftScores[`away-${m.id}`];
            if (homeVal === undefined || awayVal === undefined || homeVal === "" || awayVal === "") {
                allFilled = false;
            }
        });

        const btn = document.getElementById('submit-btn');
        if (btn) {
            if (allFilled) {
                btn.removeAttribute('disabled');
                btn.innerText = `Zatwierdź i Wyślij Fazę ${currentLetter}`;
            } else {
                btn.setAttribute('disabled', 'true');
                btn.innerText = "Wypełnij wszystkie mecze fazy";
            }
        }
    }

    async function submitCurrentGroup() {
        const currentLetter = groupsOrder[currentGroupIndex];
        const groupMatches = allMatches.filter(m => m.group === currentLetter);
        
        showLoading(true);

        const updateData = {
            akcja: "zapiszTypy",
            gracz: currentUser
        };

        groupMatches.forEach(m => {
            const matchKey = m.id.toLowerCase();
            const homeVal = localDraftScores[`home-${m.id}`];
            const awayVal = localDraftScores[`away-${m.id}`];
            if (homeVal !== undefined && awayVal !== undefined && homeVal !== "" && awayVal !== "") {
                updateData[matchKey] = `${homeVal}:${awayVal}`;
            } else {
                updateData[matchKey] = ""; 
            }
        });

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                mode: "cors",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify(updateData)
            });
            const resultText = await response.text();
            alert(`Dane dla Fazy ${currentLetter} zostały zapisane!`);
            loadAllScores();
        } catch (error) {
            console.error("Błąd zapisu:", error);
            alert("Wystąpił problem podczas wysyłania typów.");
            showLoading(false);
        }
    }

    function evaluatePrediction(playerPrediction, officialResult, matchGroup) {
        if (!officialResult || officialResult === "" || !playerPrediction || playerPrediction === "-" || !playerPrediction.includes(":")) {
            return { points: 0, cssClass: "", type: "none" };
        }

        let exactPoints = 0;
        let trendPoints = 0;

        if (matchGroup === "1/16") {
            exactPoints = 90;
            trendPoints = 60;
        } else if (matchGroup === "1/8") {
            exactPoints = 135;
            trendPoints = 90;
        } else if (matchGroup === "1/4") {
            exactPoints = 180;
            trendPoints = 120;
        } else if (matchGroup === "1/2") {
            exactPoints = 225;
            trendPoints = 150;
        } else if (matchGroup === "Finały") {
            exactPoints = 270;
            trendPoints = 180;
        } else {
            exactPoints = 45;
            trendPoints = 30;
        }

        if (playerPrediction.trim() === officialResult.trim()) {
            return { points: exactPoints, cssClass: "cell-exact", type: "exact" };
        }

        const [pHome, pAway] = playerPrediction.split(":").map(Number);
        const [oHome, oAway] = officialResult.split(":").map(Number);
        const playerTrend = pHome > pAway ? 1 : (pHome < pAway ? -1 : 0);
        const officialTrend = oHome > oAway ? 1 : (oHome < oAway ? -1 : 0);

        if (playerTrend === officialTrend) {
            return { points: trendPoints, cssClass: "cell-trend", type: "trend" };
        }

        return { points: 0, cssClass: "cell-miss", type: "miss" };
    }

    function setTableView(viewMode) {
        currentTableView = viewMode;
        document.getElementById('toggle-tab-grupowa').className = viewMode === 'GRUPOWA' ? 'toggle-btn active' : 'toggle-btn';
        document.getElementById('toggle-tab-pucharowa').className = viewMode === 'PUCHAROWA' ? 'toggle-btn active' : 'toggle-btn';
        renderScoresTable();
    }

    function renderScoresTable() {
        const thead = document.getElementById('table-head');
        const tbody = document.getElementById('table-body');
        const leaderboardBody = document.getElementById('leaderboard-body');
        
        thead.innerHTML = "";
        tbody.innerHTML = "";
        
        const officialRow = existingDatabaseRows.find(r => r.gracz && r.gracz.trim().toLowerCase() === "admin") || {};
        const playerRows = existingDatabaseRows.filter(r => r.gracz && r.gracz.trim().toLowerCase() !== "admin");

        const filteredMatches = allMatches.filter(m => {
            const jestPucharowy = ["1/16", "1/8", "1/4", "1/2", "Finały"].includes(m.group);
            return currentTableView === "PUCHAROWA" ? jestPucharowy : !jestPucharowy;
        });

        // Budowa nagłówka tabeli
        let headHtml = `<tr><th style="min-width:140px; text-align:left;">Gracz</th>`;
        if (currentTableView === "PUCHAROWA") {
            headHtml += `<th style="min-width:150px; color:var(--primary);">⚽ STRZELEC FANTASY</th>`;
        }
        
        filteredMatches.forEach(m => {
            const f1 = teamFlags[m.t1] || "";
            const f2 = teamFlags[m.t2] || "";
            headHtml += `
                <th>
                    <div class="th-match-header">
                        <span>${f1} vs ${f2}</span>
                    </div>
                    <div style="font-size:10px; color:#8a99ad; margin-top:2px;">${m.score || '-'}</div>
                </th>
            `;
        });
        headHtml += `</tr>`;
        thead.innerHTML = headHtml;

        let playersLeaderboard = [];

        playerRows.forEach(row => {
            let totalPoints = 0;
            let countExact = 0;
            let countTrend = 0;

            // Obliczanie punktów ze wszystkich 104 meczów (zarówno grupy jak i pucharowa)
            allMatches.forEach(m => {
                const matchKey = m.id.toLowerCase();
                const playerPrediction = row[matchKey] || '-';
                const officialResult = m.score || '';
                
                const evaluation = evaluatePrediction(playerPrediction, officialResult, m.group);
                totalPoints += evaluation.points;
                
                if (evaluation.type === "exact") countExact++;
                if (evaluation.type === "trend") countTrend++;
            });

            // --- BONUS: NALICZANIE PUNKTÓW ZA STRZELCA FANTASY ---
            const chosenStrzelec = row["fantasy_strzelec"];
            if (chosenStrzelec && chosenStrzelec !== "-" && chosenStrzelec !== "") {
                let pointsPerGol = 0;
                Object.keys(fantasyPlayers).forEach(c => {
                    fantasyPlayers[c].forEach(p => {
                        if (chosenStrzelec.includes(p.name)) {
                            pointsPerGol = p.pts;
                        }
                    });
                });

                const oficjalneGole = parseInt(officialRow["fantasy_strzelec_gole"]) || 0; 
                totalPoints += (oficjalneGole * pointsPerGol);
            }

            playersLeaderboard.push({ 
                name: row.gracz, 
                points: totalPoints, 
                exacts: countExact, 
                trends: countTrend,
                strzelecDisplay: chosenStrzelec || '-'
            });

            // Renderowanie wiersza w tabeli szczegółowej
            let rowHtml = `<tr><td style="text-align:left; font-weight:bold; color:white;">${row.gracz}</td>`;
            if (currentTableView === "PUCHAROWA") {
                rowHtml += `<td style="color:#aaa; font-style:italic;">${chosenStrzelec || '-'}</td>`;
            }

            filteredMatches.forEach(m => {
                const matchKey = m.id.toLowerCase();
                const playerPrediction = row[matchKey] || '-';
                const officialResult = m.score || '';
                const evaluation = evaluatePrediction(playerPrediction, officialResult, m.group);
                rowHtml += `<td class="${evaluation.cssClass}">${playerPrediction}</td>`;
            });
            rowHtml += `</tr>`;
            
            const tr = document.createElement('tr');
            tr.innerHTML = rowHtml;
            tbody.appendChild(tr);
        });

        // Sortowanie i renderowanie rankingu generalnego
        playersLeaderboard.sort((a, b) => b.points !== a.points ? b.points - a.points : b.exacts - a.exacts);
        leaderboardBody.innerHTML = "";
        
        playersLeaderboard.forEach((player, index) => {
            const trRank = document.createElement('tr');
            trRank.className = "leaderboard-row";
            
            let formatStrzelca = player.strzelecDisplay !== "-" ? `<br><span style="font-size:10px; font-weight:normal; color:#8a99ad;">Fantasy: ${player.strzelecDisplay}</span>` : "";
            
            trRank.innerHTML = `
                <td><span class="rank-badge">${index + 1}</span></td>
                <td style="text-align: left; padding-left: 15px; font-weight: bold; color: #fff;">
                    ${player.name} <span class="stats-span">(🟢 x${player.exacts}, 🟡 x${player.trends})</span> ${formatStrzelca}
                </td>
                <td style="font-weight: bold; color: var(--primary); font-size: 16px;">${player.points} pkt</td>
            `;
            leaderboardBody.appendChild(trRank);
        });

        if(typeof twemoji !== 'undefined') {
            twemoji.parse(thead, { folder: 'svg', ext: '.svg' });
            twemoji.parse(tbody, { folder: 'svg', ext: '.svg' });
            twemoji.parse(leaderboardBody, { folder: 'svg', ext: '.svg' });
        }
    }
</script>
