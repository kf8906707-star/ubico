<html lang="pl">

        .container { max-width: 600px; width: 100%; box-sizing: border-box; }
        
        .logo-container { text-align: center; margin-bottom: 10px; width: 100%; }

        h1, h2 { text-align: center; color: var(--primary); margin-bottom: 5px; }
        .group-header-active { background: #1a2238; color: var(--primary); font-weight: bold; padding: 12px; border-radius: 6px; margin: 15px 0; text-align: center; font-size: 18px; border: 2px solid var(--primary); }
        .card { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); margin-bottom: 20px; box-sizing: border-box; }
        input, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 6px; border: none; box-sizing: border-box; }
        input[type="text"] { background: #2a3558; color: white; font-size: 16px; text-align: center; }
        button { background: var(--primary); color: var(--bg); font-weight: bold; cursor: pointer; font-size: 16px; }
        button:disabled { background: #4a5568; color: #a0aec0; cursor: not-allowed; box-shadow: none !important; }
        button:hover:not(:disabled) { opacity: 0.9; }
        .hidden { display: none !important; }
        
        /* Ekran ładowania (Loader) */
        #loading-screen { text-align: center; padding: 40px 20px; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); width: 42px; height: 42px; border-radius: 50%; border-left-color: var(--primary); animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .match-row { display: flex; align-items: center; justify-content: space-between; margin: 12px 0; padding-bottom: 8px; border-bottom: 1px solid #2a3558; }
        .match-info { display: flex; flex-direction: column; width: 65%; }
        .match-teams { font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .match-date { font-size: 11px; color: #8a99ad; margin-top: 3px; }
        .locked-text { color: var(--danger); font-weight: bold; }
        .submitted-text { color: var(--primary); font-weight: bold; }
        .score-inputs { display: flex; gap: 8px; align-items: center; }
        .score-inputs input { width: 42px; text-align: center; margin: 0; padding: 6px; background: #2a3558; color: white; border: none; border-radius: 4px; font-size: 16px; }
        .score-inputs input:disabled { background: #131927; color: #6c7a9c; cursor: not-allowed; }
        
        .success-box { background: rgba(1, 195, 141, 0.1); border: 2px dashed var(--primary); color: var(--primary); text-align: center; padding: 15px; border-radius: 8px; margin-top: 25px; font-weight: bold; font-size: 16px; }
        
        img.emoji { height: 1.2em; width: 1.2em; margin: 0 .15em; vertical-align: -0.2em; }
        
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; min-width: 1600px; }
        th, td { padding: 12px 8px; text-align: center; border-bottom: 1px solid #2a3558; font-size: 12px; }
        th { color: var(--primary); background: #1a2238; font-weight: 600; vertical-align: middle; }
        .th-match-header { font-size: 11px; font-weight: bold; color: white; white-space: nowrap; min-width: 90px; text-align: center; letter-spacing: 0.5px; display: flex; align-items: center; justify-content: center; gap: 4px; }
        
        .cell-exact { background-color: #028a5a !important; color: white !important; font-weight: bold; } 
        .cell-trend { background-color: #b8860b !important; color: white !important; font-weight: bold; } 
        .cell-miss { background-color: #8b0000 !important; color: #ffcccc !important; } 

        .leaderboard-table { min-width: 100% !important; }
        .leaderboard-table th, .leaderboard-table td { padding: 10px; font-size: 14px; }
        .leaderboard-row:nth-child(1) { background: rgba(255, 215, 0, 0.15); } 
        .rank-badge { font-weight: bold; display: inline-block; width: 24px; height: 24px; line-height: 24px; border-radius: 50%; background: #2a3558; color: white; text-align: center; font-size: 12px; }
        .leaderboard-row:nth-child(1) .rank-badge { background: #ffd700; color: #131927; }
        .leaderboard-row:nth-child(2) .rank-badge { background: #c0c0c0; color: #131927; }
        .leaderboard-row:nth-child(3) .rank-badge { background: #cd7f32; color: #131927; }
        .stats-span { font-size: 11px; color: #8a99ad; margin-left: 5px; font-weight: normal; }

        .progress-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; background: #1a2238; padding: 8px; border-radius: 6px; margin-bottom: 15px; box-sizing: border-box; }
        .progress-step { color: #6c7a9c; background: #131927; cursor: pointer; padding: 10px 0; border-radius: 4px; transition: background 0.2s; text-align: center; font-size: 14px; font-weight: bold; }
        .progress-step:hover { background: #2a3558; color: white; }
        .progress-step.active { color: var(--bg); background: var(--primary); }

        .table-toggle-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .toggle-btn { background: #1a2238; color: #8a99ad; border: 1px solid #2a3558; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: bold; cursor: pointer; width: auto; margin: 0; }
        .toggle-btn.active { background: var(--primary); color: var(--bg); border-color: var(--primary); }

        @media (min-width: 500px) {
            .progress-bar { grid-template-columns: repeat(12, 1fr); gap: 4px; }
            .progress-bar.pucharowa-grid { grid-template-columns: repeat(5, 1fr) !important; }
            .progress-step { padding: 6px 0; font-size: 12px; }
            .logo-container img { max-width: 240px; }
        }
    </style>
</head>

    window.addEventListener('DOMContentLoaded', () => {
        initApp();
    });

    function initApp() {
        const savedNick = localStorage.getItem('typerNick');
        updateGroupNav();
        
        // Zawsze ładujemy najpierw bazę z Google Sheets
        loadAllScores().then(() => {
            if (savedNick) {
                currentUser = savedNick;
                document.getElementById('user-display').innerText = currentUser;
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                
                fillLocalDraftFromDatabase(currentUser);
                renderActiveGroup();
                renderProgressBar();
            } else {
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('login-screen').classList.remove('hidden');
            }
        });
    }

    async function loadAllScores() {
        const loader = document.getElementById('loading-screen');
        if (loader && currentUser) loader.classList.remove('hidden');

        try {
            const response = await fetch(API_URL);
            if (!response.ok) {
                throw new Error(`Serwer zwrócił status: ${response.status}`);
            }
            
            const data = await response.json();
            console.log("Dane pobrane z bazy:", data);

            // Poprawka odporności na strukturę danych
            if (data && typeof data === 'object' && !Array.isArray(data) && data[KEY_NAME]) {
                existingDatabaseRows = data[KEY_NAME];
            } else if (Array.isArray(data)) {
                existingDatabaseRows = data;
            } else if (data && data.status === "error") {
                throw new Error(data.message || "Błąd skryptu Google Sheets");
            } else {
                existingDatabaseRows = [];
            }

            if (loader) loader.classList.add('hidden');

            if (currentUser) {
                fillLocalDraftFromDatabase(currentUser);
                renderProgressBar();
                renderActiveGroup();
            }
            renderScoresTable();

        } catch (error) {
            console.error("Błąd ładowania danych:", error);
            if (loader) loader.classList.add('hidden');
            alert(`Nie udało się pobrać danych!\nPowód: ${error.message}\n\nUpewnij się, że w Google Apps Script wdrożyłeś nową wersję jako "Anyone" (Każdy).`);
        }
    }

    function loginUser() {
        const input = document.getElementById('nick-input').value.trim();
        if(!input) { alert("Wpisz poprawny nick!"); return; }
        
        currentUser = input;
        localStorage.setItem('typerNick', currentUser);
        document.getElementById('user-display').innerText = currentUser;
        
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('app-screen').classList.remove('hidden');
        
        fillLocalDraftFromDatabase(currentUser);
        renderActiveGroup();
        renderProgressBar();
        renderScoresTable();
    }

    function fillLocalDraftFromDatabase(username) {
        const userRow = existingDatabaseRows.find(row => row.gracz && row.gracz.toLowerCase() === username.toLowerCase());
        localDraftScores = {};
        
        allMatches.forEach(m => {
            const key = m.id.toLowerCase();
            if (userRow && userRow[key]) {
                localDraftScores[m.id] = userRow[key];
            } else {
                localDraftScores[m.id] = "";
            }
        });
    }

    function updateGroupNav() {
        const bar = document.getElementById('steps-bar');
        bar.innerHTML = "";
        
        if (POKAZUJ_FAZE_PUCHAROWA) {
            bar.classList.add('pucharowa-grid');
        } else {
            bar.classList.remove('pucharowa-grid');
        }
        
        groupsOrder.forEach((g, idx) => {
            const div = document.createElement('div');
            div.className = "progress-step" + (idx === currentGroupIndex ? " active" : "");
            div.innerText = g;
            div.onclick = () => {
                currentGroupIndex = idx;
                updateGroupNav();
                renderActiveGroup();
            };
            bar.appendChild(div);
        });
    }

    function renderProgressBar() {
        updateGroupNav();
    }

    function renderActiveGroup() {
        const activeGroupName = groupsOrder[currentGroupIndex];
        document.getElementById('group-title').innerText = POKAZUJ_FAZE_PUCHAROWA ? `🏆 Etap: ${activeGroupName}` : `⚽ Grupa ${activeGroupName}`;
        
        const matches = allMatches.filter(m => m.group === activeGroupName);
        const listContainer = document.getElementById('matches-list');
        listContainer.innerHTML = "";
        
        let allInputsFilled = true;
        const now = new Date();

        matches.forEach(m => {
            const isLocked = now > new Date(m.lock);
            const currentVal = localDraftScores[m.id] || "";
            
            let parts = ["", ""];
            if(currentVal.includes(":")) parts = currentVal.split(":");
            
            const row = document.createElement('div');
            row.className = "match-row";
            
            const f1 = teamFlags[m.1] || teamFlags[m.t1] || "🏳️";
            const f2 = teamFlags[m.2] || teamFlags[m.t2] || "🏳️";
            const team1Name = m.t1 || m.1;
            const team2Name = m.t2 || m.2;

            let statusHtml = "";
            if (isLocked) {
                statusHtml = `<span class="locked-text">🔒 Zamknięty</span>`;
            } else if (currentVal !== "") {
                statusHtml = `<span class="submitted-text">💾 Zapisano (${currentVal})</span>`;
            } else {
                allInputsFilled = false;
            }

            row.innerHTML = `
                <div class="match-info">
                    <div class="match-teams">${f1} ${team1Name} vs ${team2Name} ${f2}</div>
                    <div class="match-date">Koniec typowania: ${new Date(m.lock).toLocaleString('pl-PL')} | ${statusHtml}</div>
                </div>
                <div class="score-inputs">
                    <input type="text" maxlength="2" id="${m.id}_g1" value="${parts[0]}" ${isLocked ? 'disabled' : ''} oninput="onInputChange('${m.id}')">
                    <span style="color:#6c7a9c;font-weight:bold">:</span>
                    <input type="text" maxlength="2" id="${m.id}_g2" value="${parts[1]}" ${isLocked ? 'disabled' : ''} oninput="onInputChange('${m.id}')">
                </div>
            `;
            listContainer.appendChild(row);
        });

        const sBtn = document.getElementById('submit-btn');
        // Jeśli wszystkie mecze w grupie są zablokowane czasowo
        const allLocked = matches.every(m => now > new Date(m.lock));
        
        if (allLocked) {
            sBtn.disabled = true;
            sBtn.innerText = "Etap zamknięty (Czas minął)";
            sBtn.style.background = "#4a5568";
        } else {
            sBtn.disabled = !allInputsFilled;
            sBtn.innerText = allInputsFilled ? "💾 Wyślij / Aktualizuj typy tej sekcji" : "Wypełnij wszystkie mecze sekcji";
            sBtn.style.background = allInputsFilled ? "var(--primary)" : "#4a5568";
        }
        
        if(typeof twemoji !== 'undefined') twemoji.parse(listContainer);
    }

    function onInputChange(matchId) {
        const g1 = document.getElementById(`${matchId}_g1`).value.trim();
        const g2 = document.getElementById(`${matchId}_g2`).value.trim();
        
        if (g1 !== "" && g2 !== "" && !isNaN(g1) && !isNaN(g2)) {
            localDraftScores[matchId] = `${g1}:${g2}`;
        } else {
            localDraftScores[matchId] = "";
        }
        
        // Dynamiczna weryfikacja przycisku wysyłania bez przerysowywania całości
        const activeGroupName = groupsOrder[currentGroupIndex];
        const groupMatches = allMatches.filter(m => m.group === activeGroupName);
        const allFilled = groupMatches.every(m => localDraftScores[m.id] && localDraftScores[m.id] !== "");
        
        const sBtn = document.getElementById('submit-btn');
        if (sBtn.innerText.indexOf("zamknięty") === -1) {
            sBtn.disabled = !allFilled;
            sBtn.innerText = allFilled ? "💾 Wyślij / Aktualizuj typy tej sekcji" : "Wypełnij wszystkie mecze sekcji";
            sBtn.style.background = allFilled ? "var(--primary)" : "#4a5568";
        }
    }

    async function submitCurrentGroup() {
        const activeGroupName = groupsOrder[currentGroupIndex];
        const groupMatches = allMatches.filter(m => m.group === activeGroupName);
        
        const payload = {
            akcja: "zapisz",
            gracz: currentUser,
            typy: {}
        };
        
        groupMatches.forEach(m => {
            payload.typy[m.id.toLowerCase()] = localDraftScores[m.id] || "";
        });

        const sBtn = document.getElementById('submit-btn');
        sBtn.disabled = true;
        sBtn.innerText = "⏳ Wysyłanie do Google Sheets...";

        try {
            const res = await fetch(API_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            const box = document.createElement('div');
            box.className = "success-box";
            box.innerText = `✔️ Typy dla sekcji "${activeGroupName}" zostały pomyślnie zapisane w bazie!`;
            
            const container = document.getElementById('submit-container');
            const oldBox = container.querySelector('.success-box');
            if(oldBox) oldBox.remove();
            container.appendChild(box);

            setTimeout(() => box.remove(), 6000);
            
            // Ponowne pobranie tabeli głównej dla odświeżenia
            await loadAllScores();

        } catch (e) {
            console.error(e);
            alert("Błąd zapisu danych! Sprawdź połączenie.");
        } finally {
            renderActiveGroup();
        }
    }

    function setTableView(view) {
        currentTableView = view;
        document.getElementById('toggle-tab-grupowa').className = "toggle-btn" + (view === 'GRUPOWA' ? " active" : "");
        document.getElementById('toggle-tab-pucharowa').className = "toggle-btn" + (view === 'PUCHAROWA' ? " active" : "");
        renderScoresTable();
    }

    function evaluatePrediction(userPrediction, actualScore) {
        if (!actualScore || !userPrediction || userPrediction === "-") {
            return { points: 0, cssClass: "" };
        }
        if (userPrediction === actualScore) {
            return { points: 3, cssClass: "cell-exact" };
        }
        
        const [u1, u2] = userPrediction.split(":").map(Number);
        const [a1, a2] = actualScore.split(":").map(Number);
        
        if ((u1 > u2 && a1 > a2) || (u1 < u2 && a1 < a2) || (u1 === u2 && a1 === a2)) {
            return { points: 1, cssClass: "cell-trend" };
        }
        
        return { points: 0, cssClass: "cell-miss" };
    }

    function renderScoresTable() {
        const thead = document.getElementById('table-head');
        const tbody = document.getElementById('table-body');
        const leaderboardBody = document.getElementById('leaderboard-body');
        
        thead.innerHTML = "";
        tbody.innerHTML = "";

        // Filtrujemy mecze według wybranego widoku na dole tabeli
        let filteredMatches = [];
        if (currentTableView === "PUCHAROWA") {
            filteredMatches = allMatches.filter(m => ["1/16", "1/8", "1/4", "1/2", "Finały"].includes(m.group));
        } else {
            filteredMatches = allMatches.filter(m => !["1/16", "1/8", "1/4", "1/2", "Finały"].includes(m.group));
        }

        // Nagłówek tabeli głównej
        let headHtml = `<tr><th style="min-width:120px; background:#01c38d; color:#131927;">Gracz</th>`;
        filteredMatches.forEach(m => {
            const f1 = teamFlags[m.t1 || m.1] || "🏳️";
            const f2 = teamFlags[m.t2 || m.2] || "🏳️";
            const title = `${m.t1 || m.1} - ${m.t2 || m.2}`;
            const realRes = m.score ? `<br><b style="color:#01c38d; font-size:12px;">(${m.score})</b>` : `<br><span style="color:#8a99ad; font-size:10px;">brak</span>`;
            
            headHtml += `
                <th>
                    <div class="th-match-header" title="${title}">
                        ${f1} vs ${f2}<br>${m.id} ${realRes}
                    </div>
                </th>`;
        });
        headHtml += `</tr>`;
        thead.innerHTML = headHtml;

        // Budowanie wierszy dla każdego gracza oraz liczenie klasyfikacji generalnej
        const playersLeaderboard = [];

        existingDatabaseRows.forEach(row => {
            if (!row.gracz) return;

            let totalPoints = 0;
            let countExact = 0;
            let countTrend = 0;

            // Obliczamy punkty globalnie dla WSZYSTKICH meczów (grupowych + pucharowych)
            allMatches.forEach(m => {
                const matchKey = m.id.toLowerCase();
                const playerPrediction = row[matchKey] || "-";
                const evaluation = evaluatePrediction(playerPrediction, m.score);
                
                totalPoints += evaluation.points;
                if (evaluation.cssClass === "cell-exact") countExact++;
                if (evaluation.cssClass === "cell-trend") countTrend++;
            });

            // Generowanie kodu HTML wiersza wyłącznie dla meczów z aktualnie filtrowanej fazy
            let rowHtml = `<td style="font-weight:bold; color:white; text-align:left; background:#1a2238; border-right:2px solid #2a3558;">👤 ${row.gracz}</td>`;
            filteredMatches.forEach(m => {
                const matchKey = m.id.toLowerCase();
                const playerPrediction = row[matchKey] || "-";
                const evaluation = evaluatePrediction(playerPrediction, m.score);
                rowHtml += `<td class="${evaluation.cssClass}">${playerPrediction}</td>`;
            });
            
            const tr = document.createElement('tr');
            tr.innerHTML = rowHtml;
            tbody.appendChild(tr);

            playersLeaderboard.push({ name: row.gracz, points: totalPoints, exacts: countExact, trends: countTrend });
        });

        // Sortowanie rankingu głównego
        playersLeaderboard.sort((a, b) => b.points !== a.points ? b.points - a.points : b.exacts - a.exacts);
        leaderboardBody.innerHTML = "";
        
        playersLeaderboard.forEach((player, index) => {
            const trRank = document.createElement('tr');
            trRank.className = "leaderboard-row";
            trRank.innerHTML = `
                <td><span class="rank-badge">${index + 1}</span></td>
                <td style="text-align: left; padding-left: 15px; font-weight: bold; color: #fff;">
                    ${player.name} <span class="stats-span">(🟢 x${player.exacts}, 🟡 x${player.trends})</span>
                </td>
                <td style="font-weight: bold; color: #01c38d; font-size: 16px;">${player.points} pkt</td>
            `;
            leaderboardBody.appendChild(trRank);
        });

        if(typeof twemoji !== 'undefined') {
            twemoji.parse(thead);
            twemoji.parse(tbody);
            twemoji.parse(leaderboardBody);
        }
    }
