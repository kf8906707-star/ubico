<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oficjalny Typer Mundial UBICO 2026</title>
    <link rel="icon" type="image/jpeg" href="https://i.ibb.co/Qv1dF627/ubc.png">
    <script src="https://cdn.jsdelivr.net/npm/@twemoji/api@14.1.0/dist/twemoji.min.js" crossorigin="anonymous"></script>
    <style>
        :root { --primary: #01c38d; --bg: #131927; --card: #1e2640; --text: #ffffff; --danger: #ff4a4a; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 600px; width: 100%; box-sizing: border-box; }
        .logo-container { text-align: center; margin-bottom: 10px; width: 100%; }
        .logo-container img { max-width: 180px; width: 100%; height: auto; object-fit: containment; }
        h1, h2 { text-align: center; color: var(--primary); margin-bottom: 5px; }
        .group-header-active { background: #1a2238; color: var(--primary); font-weight: bold; padding: 12px; border-radius: 6px; margin: 15px 0; text-align: center; font-size: 18px; border: 2px solid var(--primary); }
        .card { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); margin-bottom: 20px; box-sizing: border-box; }
        input, button, select { width: 100%; padding: 12px; margin-top: 10px; border-radius: 6px; border: none; box-sizing: border-box; }
        input[type="text"] { background: #2a3558; color: white; font-size: 16px; text-align: center; }
        select { background: #2a3558; color: white; font-size: 14px; cursor: pointer; }
        button { background: var(--primary); color: var(--bg); font-weight: bold; cursor: pointer; font-size: 16px; }
        button:disabled { background: #4a5568; color: #a0aec0; cursor: not-allowed; box-shadow: none !important; }
        .hidden { display: none !important; }
        #loading-screen { text-align: center; padding: 40px 20px; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); width: 42px; height: 42px; border-radius: 50%; border-left-color: var(--primary); animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .match-row { display: flex; align-items: center; justify-content: space-between; margin: 12px 0; padding-bottom: 8px; border-bottom: 1px solid #2a3558; }
        .match-info { display: flex; flex-direction: column; width: 65%; }
        .match-teams { font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .match-date { font-size: 11px; color: #8a99ad; margin-top: 3px; }
        .score-inputs { display: flex; gap: 8px; align-items: center; }
        .score-inputs input { width: 42px; text-align: center; margin: 0; padding: 6px; background: #2a3558; color: white; border: none; border-radius: 4px; font-size: 16px; }
        .scorers-section { margin-top: 20px; padding-top: 15px; border-top: 2px dashed #2a3558; }
        .scorer-row { display: flex; flex-direction: column; gap: 5px; margin-bottom: 15px; padding: 10px; background: #1a2238; border-radius: 6px; }
        .scorer-selects { display: flex; gap: 10px; }
        .scorer-selects select { margin-top: 0; }
        .success-box { background: rgba(1, 195, 141, 0.1); border: 2px dashed var(--primary); color: var(--primary); text-align: center; padding: 15px; border-radius: 8px; margin-top: 25px; font-weight: bold; font-size: 16px; }
        img.emoji { height: 1.2em; width: 1.2em; margin: 0 .15em; vertical-align: -0.2em; }
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; min-width: 1000px; }
        th, td { padding: 12px 8px; text-align: center; border-bottom: 1px solid #2a3558; font-size: 12px; }
        th { color: var(--primary); background: #1a2238; font-weight: 600; }
        .cell-exact { background-color: #028a5a !important; color: white !important; font-weight: bold; } 
        .cell-trend { background-color: #b8860b !important; color: white !important; font-weight: bold; } 
        .cell-miss { background-color: #8b0000 !important; color: #ffcccc !important; } 
        .leaderboard-table { min-width: 100% !important; }
        .leaderboard-table th, .leaderboard-table td { padding: 10px; font-size: 14px; }
        .rank-badge { font-weight: bold; display: inline-block; width: 24px; height: 24px; line-height: 24px; border-radius: 50%; background: #2a3558; color: white; text-align: center; font-size: 12px; }
        .progress-bar { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; background: #1a2238; padding: 8px; border-radius: 6px; margin-bottom: 15px; }
        .progress-step { color: #6c7a9c; background: #131927; cursor: pointer; padding: 10px 0; border-radius: 4px; text-align: center; font-size: 13px; font-weight: bold; }
        .progress-step.active { color: var(--bg); background: var(--primary); }
        .table-filter-bar { display: flex; gap: 10px; margin-bottom: 15px; }
        .filter-btn { flex: 1; background: #2a3558; color: #a0aec0; border: 2px solid transparent; padding: 10px; font-size: 13px; margin: 0; }
        .filter-btn.active { background: #1e2640; color: var(--primary); border-color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="https://i.ibb.co/Psxd4P4g/UBICO-MUNDIAL.jpg" alt="Logo Typera">
    </div>

    <h1>🏆 UBICO MUNDIAL 2026 ⚽</h1>

    <div id="loading-screen" class="card">
        <h2 style="color: white; font-size: 18px;">Wczytywanie danych Typera...</h2>
        <div class="spinner"></div>
    </div>

    <div id="login-screen" class="card hidden">
        <h2>Wpisz swój Nick, aby wejść do gry:</h2>
        <input type="text" id="nick-input" placeholder="np. Fabby...">
        <button id="login-btn" onclick="loginUser()">Dołącz do Typera</button>
    </div>

    <div id="app-screen" class="hidden">
        <div class="card">
            <h3>Gracz: <span id="user-display" style="color:var(--primary)"></span></h3>
            <div class="progress-bar" id="steps-bar"></div>
            <div id="group-title" class="group-header-active"></div>
            <div id="matches-list">Ładowanie meczów...</div>
            
            <div id="scorers-container" class="scorers-section hidden">
                <h3 style="color: var(--primary); margin-bottom: 5px; text-align: center;">🎯 Wytypuj 4 strzelców bramek</h3>
                <p style="font-size: 12px; color: #8a99ad; text-align: center; margin-top: 0;">Obrońca = 250 pkt | Pomocnik = 175 pkt | Napastnik = 100 pkt</p>
                <div id="scorers-inputs-grid"></div>
            </div>

            <div id="submit-container">
                <button id="submit-btn" onclick="submitCurrentGroup()" style="margin-top: 25px; font-size: 18px;" disabled>Wypełnij dane</button>
            </div>
        </div>

        <div class="card">
            <h2>📊 Szczegółowe Typy Graczy</h2>
            <div class="table-filter-bar">
                <button class="filter-btn active" id="filter-btn-pucharowa" onclick="setTableFilter('pucharowa')">Faza Pucharowa</button>
                <button class="filter-btn" id="filter-btn-grupowa" onclick="setTableFilter('grupowa')">Faza Grupowa</button>
            </div>
            <button onclick="loadAllScores()" style="background:#2a3558; color:white; font-size:12px; padding:6px; margin-bottom:10px; width:auto;">🔄 Odśwież</button>
            <div class="table-container">
                <table id="global-table">
                    <thead id="table-head"></thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>

        <div class="card">
            <h2>🏆 Klasyfikacja Generalna UBICO</h2>
            <div class="table-container">
                <table class="leaderboard-table">
                    <thead>
                        <tr>
                            <th style="width: 60px;">Poz.</th>
                            <th style="text-align: left; padding-left: 15px;">Gracz</th>
                            <th style="width: 100px;">Punkty</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwITEYeeJMhwBvCygn9f75aGAmkIfRL8XJV7erXPZYOj84GDMBXgWHLvut7rNXIBag4hA/exec";
    const KEY_NAME = "sheet1"; 

    const groupsOrder = ["1/16", "1/8", "1/4", "1/2", "FINALE"];
    let currentGroupIndex = 0; 
    let localDraftScores = {}; 
    let existingDatabaseRows = [];
    let currentTableFilter = "pucharowa"; 

    // --- PEŁNE OFICJALNE SKŁADY Z PODZIAŁEM NA POZYCJE (BEZ BRAMKARZY) ---
    const playersDatabase = {
        "Francja": [
            { name: "William Saliba", pos: "obronca" }, { name: "Dayot Upamecano", pos: "obronca" }, { name: "Jules Kounde", pos: "obronca" }, { name: "Theo Hernandez", pos: "obronca" }, { name: "Ibrahima Konate", pos: "obronca" }, { name: "Jonathan Clauss", pos: "obronca" }, { name: "Benjamin Pavard", pos: "obronca" }, { name: "Ferland Mendy", pos: "obronca" },
            { name: "Aurelien Tchouameni", pos: "pomocnik" }, { name: "Eduardo Camavinga", pos: "pomocnik" }, { name: "Adrien Rabiot", pos: "pomocnik" }, { name: "Warren Zaire-Emery", pos: "pomocnik" }, { name: "Youssouf Fofana", pos: "pomocnik" }, { name: "N'Golo Kante", pos: "pomocnik" },
            { name: "Kylian Mbappe", pos: "napastnik" }, { name: "Antoine Griezmann", pos: "napastnik" }, { name: "Ousmane Dembele", pos: "napastnik" }, { name: "Marcus Thuram", pos: "napastnik" }, { name: "Bradley Barcola", pos: "napastnik" }, { name: "Olivier Giroud", pos: "napastnik" }, { name: "Kingsley Coman", pos: "napastnik" }, { name: "Randal Kolo Muani", pos: "napastnik" }
        ],
        "Anglia": [
            { name: "John Stones", pos: "obronca" }, { name: "Kyle Walker", pos: "obronca" }, { name: "Marc Guehi", pos: "obronca" }, { name: "Kieran Trippier", pos: "obronca" }, { name: "Luke Shaw", pos: "obronca" }, { name: "Ezri Konsa", pos: "obronca" }, { name: "Joe Gomez", pos: "obronca" }, { name: "Lewis Dunk", pos: "obronca" },
            { name: "Declan Rice", pos: "pomocnik" }, { name: "Jude Bellingham", pos: "pomocnik" }, { name: "Kobbie Mainoo", pos: "pomocnik" }, { name: "Cole Palmer", pos: "pomocnik" }, { name: "Conor Gallagher", pos: "pomocnik" }, { name: "Trent Alexander-Arnold", pos: "pomocnik" }, { name: "Adam Wharton", pos: "pomocnik" },
            { name: "Harry Kane", pos: "napastnik" }, { name: "Bukayo Saka", pos: "napastnik" }, { name: "Phil Foden", pos: "napastnik" }, { name: "Ollie Watkins", pos: "napastnik" }, { name: "Anthony Gordon", pos: "napastnik" }, { name: "Ivan Toney", pos: "napastnik" }, { name: "Jarrod Bowen", pos: "napastnik" }
        ],
        "Hiszpania": [
            { name: "Aymeric Laporte", pos: "obronca" }, { name: "Robin Le Normand", pos: "obronca" }, { name: "Dani Carvajal", pos: "obronca" }, { name: "Marc Cucurella", pos: "obronca" }, { name: "Dani Vivian", pos: "obronca" }, { name: "Alejandro Grimaldo", pos: "obronca" }, { name: "Jesus Navas", pos: "obronca" }, { name: "Nacho Fernandez", pos: "obronca" },
            { name: "Rodri", pos: "pomocnik" }, { name: "Pedri", pos: "pomocnik" }, { name: "Dani Olmo", pos: "pomocnik" }, { name: "Fabian Ruiz", pos: "pomocnik" }, { name: "Mikel Merino", pos: "pomocnik" }, { name: "Martin Zubimendi", pos: "pomocnik" }, { name: "Alex Baena", pos: "pomocnik" }, { name: "Fermin Lopez", pos: "pomocnik" },
            { name: "Lamine Yamal", pos: "napastnik" }, { name: "Nico Williams", pos: "napastnik" }, { name: "Alvaro Morata", pos: "napastnik" }, { name: "Mikel Oyarzabal", pos: "napastnik" }, { name: "Ferran Torres", pos: "napastnik" }, { name: "Joselu", pos: "napastnik" }, { name: "Ayoze Perez", pos: "napastnik" }
        ],
        "Argentyna": [
            { name: "Cristian Romero", pos: "obronca" }, { name: "Nicolas Otamendi", pos: "obronca" }, { name: "Nahuel Molina", pos: "obronca" }, { name: "Nicolas Tagliafico", pos: "obronca" }, { name: "Lisandro Martinez", pos: "obronca" }, { name: "Gonzalo Montiel", pos: "obronca" }, { name: "Marcos Acuna", pos: "obronca" }, { name: "Lucas Martinez Quarta", pos: "obronca" }, { name: "Germán Pezzella", pos: "obronca" },
            { name: "Rodrigo De Paul", pos: "pomocnik" }, { name: "Alexis Mac Allister", pos: "pomocnik" }, { name: "Enzo Fernandez", pos: "pomocnik" }, { name: "Giovani Lo Celso", pos: "pomocnik" }, { name: "Leandro Paredes", pos: "pomocnik" }, { name: "Exequiel Palacios", pos: "pomocnik" }, { name: "Guido Rodriguez", pos: "pomocnik" },
            { name: "Lionel Messi", pos: "napastnik" }, { name: "Julian Alvarez", pos: "napastnik" }, { name: "Lautaro Martinez", pos: "napastnik" }, { name: "Angel Di Maria", pos: "napastnik" }, { name: "Nicolas Gonzalez", pos: "napastnik" }, { name: "Alejandro Garnacho", pos: "napastnik" }, { name: "Valentin Carboni", pos: "napastnik" }
        ]
    };

    const teamFlags = { "Francja": "🇫🇷", "Anglia": "🏴󠁧󠁢󠁥󠁮󠁧󠁿", "Hiszpania": "🇪🇸", "Argentyna": "🇦🇷" };

    const allMatches = [
        // Dodaj tutaj swoje archiwalne mecze grupowe i pucharowe w identycznym formacie, jeśli chcesz, by wyświetlały się w tabeli.
        { id: "Mecz103", group: "FINALE", t1: "Francja", t2: "Anglia", lock: "2026-07-18T22:00:00", score: "", venue: "Mecz o 3. miejsce" },
        { id: "Mecz104", group: "FINALE", t1: "Hiszpania", t2: "Argentyna", lock: "2026-07-19T21:00:00", score: "", venue: "Wielki Finał" }
    ];

    function getFlagAnd3LetterCode(t) { return t ? `${teamFlags[t]||''} ${t.substring(0,3).toUpperCase()}` : '❓'; }
    function refreshTwemoji() { if (window.twemoji) twemoji.parse(document.body, { folder: 'svg', ext: '.svg' }); }
    function isGroupSubmittedByPlayer(g) { const n = localStorage.getItem('typerNick') || ""; return localStorage.getItem(`submitted_group_${g.toLowerCase()}_${n.toLowerCase()}`) === "true"; }

    async function initApp() {
        await loadAllScores();
        currentGroupIndex = 4; 
        document.getElementById('loading-screen').classList.add('hidden');
        const savedNick = localStorage.getItem('typerNick');
        if (savedNick) showApp(savedNick); else document.getElementById('login-screen').classList.remove('hidden');
    }
    window.onload = initApp;

    function loginUser() {
        const n = document.getElementById('nick-input').value.trim();
        if (n.length < 3) return alert('Min. 3 znaki!');
        localStorage.setItem('typerNick', n);
        document.getElementById('login-screen').classList.add('hidden');
        showApp(n);
    }

    function showApp(nick) {
        document.getElementById('app-screen').classList.remove('hidden');
        document.getElementById('user-display').innerText = nick;
        fillLocalDraftFromDatabase(nick);
        renderProgressBar();
        renderActiveGroup();
    }

    function fillLocalDraftFromDatabase(nick) {
        if (!existingDatabaseRows.length) return;
        const uRow = existingDatabaseRows.find(r => r.gracz && r.gracz.toLowerCase() === nick.toLowerCase());
        if (uRow) {
            groupsOrder.forEach(g => {
                allMatches.filter(m => m.group === g).forEach(m => {
                    const res = uRow[m.id.toLowerCase()];
                    if (res && res.includes(":")) {
                        localDraftScores[`home-${m.id}`] = res.split(":")[0].trim();
                        localDraftScores[`away-${m.id}`] = res.split(":")[1].trim();
                    }
                });
                if (g === "FINALE") {
                    for (let i = 1; i <= 4; i++) {
                        if (uRow[`strzelec${i}`]) {
                            localDraftScores[`strzelec${i}`] = uRow[`strzelec${i}`];
                            localDraftScores[`kraj${i}`] = uRow[`kraj${i}`] || "";
                        }
                    }
                }
            });
        }
    }

    function renderProgressBar() {
        const bar = document.getElementById('steps-bar'); bar.innerHTML = "";
        groupsOrder.forEach((g, idx) => {
            const span = document.createElement('span');
            span.className = `progress-step ${idx === currentGroupIndex ? 'active' : ''}`;
            span.innerText = isGroupSubmittedByPlayer(g) ? `${g} ✓` : g;
            span.onclick = () => changeGroup(idx);
            bar.appendChild(span);
        });
    }

    function changeGroup(idx) { saveCurrentInputsToDraft(); currentGroupIndex = idx; renderProgressBar(); renderActiveGroup(); }

    function saveCurrentInputsToDraft() {
        const currentLetter = groupsOrder[currentGroupIndex];
        document.querySelectorAll('.match-row').forEach(row => {
            const id = row.getAttribute('data-id');
            const h = row.querySelector('.home-team'), a = row.querySelector('.away-team');
            if(h && a) { localDraftScores[`home-${id}`] = h.value; localDraftScores[`away-${id}`] = a.value; }
        });
        if (currentLetter === "FINALE") {
            for (let i = 1; i <= 4; i++) {
                const kSel = document.getElementById(`kraj-${i}`), zSel = document.getElementById(`strzelec-${i}`);
                if (kSel && zSel) { localDraftScores[`kraj${i}`] = kSel.value; localDraftScores[`strzelec${i}`] = zSel.value; }
            }
        }
    }

    function updatePlayersDropdown(index, selectedCountry, savedPlayer = "") {
        const pSel = document.getElementById(`strzelec-${index}`);
        if (!pSel) return;
        pSel.innerHTML = '<option value="">-- Wybierz Zawodnika --</option>';
        if (!selectedCountry || !playersDatabase[selectedCountry]) return;

        playersDatabase[selectedCountry].forEach(p => {
            let pts = p.pos === "obronca" ? "250 pkt" : (p.pos === "pomocnik" ? "175 pkt" : "100 pkt");
            const opt = document.createElement('option');
            opt.value = p.name;
            opt.innerText = `${p.name} (${pts})`;
            if (p.name === savedPlayer) opt.selected = true;
            pSel.appendChild(opt);
        });
    }

    function renderActiveGroup() {
        const currentLetter = groupsOrder[currentGroupIndex];
        document.getElementById('group-title').innerText = `RUNDA: ${currentLetter}`;
        const container = document.getElementById('matches-list');
        const scorersContainer = document.getElementById('scorers-container');
        container.innerHTML = "";
        
        const groupMatches = allMatches.filter(m => m.group === currentLetter);
        const isSubmitted = isGroupSubmittedByPlayer(currentLetter);

        groupMatches.forEach(match => {
            const div = document.createElement('div'); div.className = "match-row"; div.setAttribute('data-id', match.id);
            const sh = localDraftScores[`home-${match.id}`] || "", sa = localDraftScores[`away-${match.id}`] || "";
            div.innerHTML = `
                <div class="match-info"><span class="match-teams">${getFlagAnd3LetterCode(match.t1)} - ${getFlagAnd3LetterCode(match.t2)}</span></div>
                <div class="score-inputs">
                    <input type="number" class="home-team" value="${sh}" ${isSubmitted?'disabled':''} oninput="saveCurrentInputsToDraft(); validateGroupCompletion();">
                    <input type="number" class="away-team" value="${sa}" ${isSubmitted?'disabled':''} oninput="saveCurrentInputsToDraft(); validateGroupCompletion();">
                </div>`;
            container.appendChild(div);
        });

        if (currentLetter === "FINALE") {
            scorersContainer.classList.remove('hidden');
            const grid = document.getElementById('scorers-inputs-grid'); grid.innerHTML = "";
            for (let i = 1; i <= 4; i++) {
                const sk = localDraftScores[`kraj${i}`] || "", sz = localDraftScores[`strzelec${i}`] || "";
                const div = document.createElement('div'); div.className = "scorer-row";
                div.innerHTML = `
                    <span style="font-size:12px; color:var(--primary)">Strzelec wybor #${i}</span>
                    <div class="scorer-selects">
                        <select id="kraj-${i}" ${isSubmitted?'disabled':''} onchange="updatePlayersDropdown(${i}, this.value); saveCurrentInputsToDraft(); validateGroupCompletion();">
                            <option value="">-- Wybierz Kraj --</option>
                            <option value="Francja" ${sk==='Francja'?'selected':''}>Francja</option>
                            <option value="Anglia" ${sk==='Anglia'?'selected':''}>Anglia</option>
                            <option value="Hiszpania" ${sk==='Hiszpania'?'selected':''}>Hiszpania</option>
                            <option value="Argentyna" ${sk==='Argentyna'?'selected':''}>Argentyna</option>
                        </select>
                        <select id="strzelec-${i}" ${isSubmitted?'disabled':''} onchange="saveCurrentInputsToDraft(); validateGroupCompletion();">
                            <option value="">-- Wybierz Zawodnika --</option>
                        </select>
                    </div>`;
                grid.appendChild(div);
                if(sk) updatePlayersDropdown(i, sk, sz);
            }
        } else { scorersContainer.classList.add('hidden'); }
        validateGroupCompletion(); refreshTwemoji();
    }

    function validateGroupCompletion() {
        const currentLetter = groupsOrder[currentGroupIndex];
        const sc = document.getElementById('submit-container');
        if (isGroupSubmittedByPlayer(currentLetter)) { sc.innerHTML = `<div class="success-box">⭐ Runda została zapisana!</div>`; return; }
        
        let valid = true;
        document.querySelectorAll('.match-row').forEach(r => {
            if([...r.querySelectorAll('input')].some(i => i.value === "")) valid = false;
        });
        if(currentLetter === "FINALE") {
            for(let i=1; i<=4; i++) {
                const z = document.getElementById(`strzelec-${i}`);
                if(!z || z.value === "") valid = false;
            }
        }
        sc.innerHTML = `<button id="submit-btn" onclick="submitCurrentGroup()" ${valid?'':'disabled'}>💾 Zapisz Typy</button>`;
    }

    async function submitCurrentGroup() {
        const nick = localStorage.getItem('typerNick'), currentLetter = groupsOrder[currentGroupIndex];
        saveCurrentInputsToDraft();
        const data = { "gracz": nick };
        allMatches.forEach(m => { data[m.id.toLowerCase()] = `${localDraftScores[`home-${m.id}`]}:${localDraftScores[`away-${m.id}`]}`; });
        if(currentLetter === "FINALE") {
            for(let i=1; i<=4; i++) { data[`strzelec${i}`] = localDraftScores[`strzelec${i}`]; data[`kraj${i}`] = localDraftScores[`kraj${i}`]; }
        }
        await fetch(API_URL, { method: 'POST', body: JSON.stringify(data) });
        localStorage.setItem(`submitted_group_${currentLetter.toLowerCase()}_${nick.toLowerCase()}`, "true");
        alert("Zapisano pomyślnie!"); loadAllScores();
    }

    function setTableFilter(f) { currentTableFilter = f; buildGlobalTableUI(); }
    async function loadAllScores() { const r = await fetch(API_URL); const d = await r.json(); existingDatabaseRows = d[KEY_NAME] || []; buildGlobalTableUI(); }

    function evaluatePrediction(pred, off, grp) {
        if (!off || !pred || pred === "-" || !pred.includes(":")) return { points: 0, type: "none", cssClass: "" };
        if (pred.trim() === off.trim()) return { points: grp==="FINALE"?270:180, type: "exact", cssClass:"cell-exact" };
        const [pH, pA] = pred.split(":").map(Number), [oH, oA] = off.split(":").map(Number);
        if ((pH>pA && oH>oA) || (pH<pA && oH<oA) || (pH===pA && oH===oA)) return { points: grp==="FINALE"?180:120, type: "trend", cssClass:"cell-trend" };
        return { points: 0, type: "miss", cssClass:"cell-miss" };
    }

    function buildGlobalTableUI() {
        const thead = document.getElementById('table-head');
        const tbody = document.getElementById('table-body');
        const lbody = document.getElementById('leaderboard-body');
        
        thead.innerHTML = ""; tbody.innerHTML = ""; lbody.innerHTML = "";
        
        let filteredMatches = [];
        if (currentTableFilter === "grupowa") {
            filteredMatches = allMatches.filter(m => !["1/16", "1/8", "1/4", "1/2", "FINALE"].includes(m.group));
        } else {
            filteredMatches = allMatches.filter(m => ["1/16", "1/8", "1/4", "1/2", "FINALE"].includes(m.group));
        }

        // Generowanie nagłówków tabeli
        const trHead = document.createElement('tr');
        trHead.innerHTML = "<th style='position:sticky; left:0; background:#1a2238; z-index:3;'>Gracz</th>";
        filteredMatches.forEach(m => {
            const resSub = m.score ? `<br><span style="color:#01c38d; font-size:10px;">(${m.score})</span>` : '';
            trHead.innerHTML += `<th><div class="th-match-header">${getFlagAnd3LetterCode(m.t1)} - ${getFlagAnd3LetterCode(m.t2)}${resSub}</div></th>`;
        });
        thead.appendChild(trHead);

        let leaderboard = [];

        existingDatabaseRows.forEach(row => {
            if (!row.gracz) return;
            let pts = 0;
            
            // Punkty za mecze
            allMatches.forEach(m => {
                const eval = evaluatePrediction(row[m.id.toLowerCase()], m.score, m.group);
                pts += eval.points;
            });

            // =========================================================================
            //  TUTAJ WPISUJESZ OFICJALNYCH STRZELCÓW PO MECZU, ABY NALICZYŁO PUNKTY!
            // =========================================================================
            const officialScorers = [
                "Kylian Mbappe", 
                "Harry Kane",
                "Dani Olmo"
            ]; 
            // =========================================================================

            // Liczenie punktów za strzelców
            for(let i = 1; i <= 4; i++) {
                const pName = row[`strzelec${i}`], cName = row[`kraj${i}`];
                if(pName && officialScorers.includes(pName)) {
                    const db = playersDatabase[cName] || [];
                    const pObj = db.find(x => x.name === pName);
                    if(pObj) {
                        if(pObj.pos === "obronca") pts += 250;
                        else if(pObj.pos === "pomocnik") pts += 175;
                        else if(pObj.pos === "napastnik") pts += 100;
                    }
                }
            }

            // Renderowanie wiersza w tabeli szczegółowej
            const tr = document.createElement('tr');
            let rowHtml = `<td style="font-weight:bold; color:#01c38d; position:sticky; left:0; background:#131927; z-index:1;">${row.gracz}</td>`;
            filteredMatches.forEach(m => {
                const pred = row[m.id.toLowerCase()] || '-';
                const eval = evaluatePrediction(pred, m.score, m.group);
                rowHtml += `<td class="${eval.cssClass || ''}">${pred}</td>`;
            });
            tr.innerHTML = rowHtml;
            tbody.appendChild(tr);

            leaderboard.push({ name: row.gracz, points: pts });
        });

        // Sortowanie i generowanie rankingu generalnego
        leaderboard.sort((a,b) => b.points - a.points).forEach((p, idx) => {
            lbody.innerHTML += `
                <tr class="leaderboard-row">
                    <td><span class="rank-badge">${idx+1}</span></td>
                    <td style="text-align:left; padding-left:15px; font-weight:bold; color:#fff;">${p.name}</td>
                    <td style="font-weight:bold; color:var(--primary); font-size:15px;">${p.points} pkt</td>
                </tr>`;
        });
        refreshTwemoji();
    }
</script>
</body>
</html>
