<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typer Mundial 2026</title>
    <style>
        :root { --primary: #01c38d; --bg: #131927; --card: #1e2640; --text: #ffffff; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 600px; width: 100%; }
        h1, h2 { text-align: center; color: var(--primary); }
        .card { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); margin-bottom: 20px; }
        input, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 6px; border: none; box-sizing: border-box; }
        input[type="text"] { background: #2a3558; color: white; font-size: 16px; }
        button { background: var(--primary); color: var(--bg); font-weight: bold; cursor: pointer; font-size: 16px; }
        button:hover { opacity: 0.9; }
        .hidden { display: none; }
        .match-row { display: flex; align-items: center; justify-content: space-between; margin: 15px 0; padding-bottom: 10px; border-bottom: 1px solid #2a3558; }
        .score-inputs { display: flex; gap: 10px; }
        .score-inputs input { width: 50px; text-align: center; margin: 0; padding: 8px; background: #2a3558; color: white; border: none; border-radius: 4px; }
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; min-width: 400px; }
        th, td { padding: 10px; text-align: center; border-bottom: 1px solid #2a3558; font-size: 14px; }
        th { color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <h1>🏆 TYPER MUNDIAL 2026 ⚽</h1>

    <div id="login-screen" class="card">
        <h2>Podaj swój Nick:</h2>
        <input type="text" id="nick-input" placeholder="np. Fabby...">
        <button onclick="saveNick()">Wejdź do gry</button>
    </div>

    <div id="app-screen" class="hidden">
        <div class="card">
            <h3>Cześć <span id="user-display" style="color:var(--primary)"></span>! Obstaw mecze:</h3>
            
            <div id="matches-container">Ładowanie terminarza...</div>

            <button onclick="submitScores()" style="margin-top: 20px;">Zapisz moje typy</button>
        </div>

        <div class="card">
            <h2>Typy wszystkich graczy</h2>
            <button onclick="loadAllScores()" style="background:#2a3558; color:white; font-size:12px; padding:5px; margin-bottom:10px; width:auto;">🔄 Odśwież tabelę</button>
            <div class="table-container">
                <table id="global-table">
                    <thead id="table-head"></thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // ⚠️ TUTAJ WKLEJ SWÓJ LINK Z SHEETDB
    const API_URL = "https://sheetdb.io/api/v1/p2i6amtlbbdei"; 

    let activeMatches = [];

    window.onload = function() {
        const savedNick = localStorage.getItem('typerNick');
        if (savedNick) {
            showApp(savedNick);
        }
    };

    function saveNick() {
        const nick = document.getElementById('nick-input').value.trim();
        if (nick.length < 3) return alert('Nick musi mieć min. 3 znaki!');
        localStorage.setItem('typerNick', nick);
        showApp(nick);
    }

    async function showApp(nick) {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('app-screen').classList.remove('hidden');
        document.getElementById('user-display').innerText = nick;
        await loadMatches();
        loadAllScores();
    }

    // Pobieranie meczów z zakładki "Mecze"
    async function loadMatches() {
        const container = document.getElementById('matches-container');
        try {
            const response = await fetch(`${API_URL}?sheet=Mecze`);
            activeMatches = await response.json();
            
            container.innerHTML = "";
            activeMatches.forEach(match => {
                const div = document.createElement('div');
                div.className = "match-row";
                div.setAttribute('data-id', match.ID);
                div.innerHTML = `
                    <span>${match.Zespol1} - ${match.Zespol2}</span>
                    <div class="score-inputs">
                        <input type="number" class="home-team" min="0" placeholder="0">
                        <input type="number" class="away-team" min="0" placeholder="0">
                    </div>
                `;
                container.appendChild(div);
            });
        } catch (error) {
            container.innerHTML = "Błąd ładowania meczów. Upewnij się, że masz w arkuszu zakładkę 'Mecze'.";
        }
    }

    // Bezpieczne zapisywanie typów metodą POST
    async function submitScores() {
        const nick = localStorage.getItem('typerNick');
        const rows = document.querySelectorAll('.match-row');
        
        const newRow = { "Gracz": nick };
        let allFilled = true;

        rows.forEach(row => {
            const id = row.getAttribute('data-id');
            const home = row.querySelector('.home-team').value;
            const away = row.querySelector('.away-team').value;
            
            if(home === "" || away === "") { allFilled = false; }
            newRow[id] = `${home}:${away}`;
        });

        if(!allFilled) return alert('Obstaw wszystkie mecze przed zapisem!');

        try {
            await fetch(`${API_URL}?sheet=Gracze`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data: [newRow] })
            });
            alert('Typy zapisane pomyślnie!');
            loadAllScores();
        } catch (error) {
            alert('Błąd zapisu danych.');
        }
    }

    // Ładowanie tabeli i odfiltrowanie dubli (zostawiamy tylko najnowszy wynik dla każdego nicku)
    async function loadAllScores() {
        const thead = document.getElementById('table-head');
        const tbody = document.getElementById('table-body');
        
        try {
            const response = await fetch(`${API_URL}?sheet=Gracze`);
            const data = await response.json();
            
            // Nagłówki tabeli
            thead.innerHTML = "";
            const trHead = document.createElement('tr');
            trHead.innerHTML = "<th>Gracz</th>";
            activeMatches.forEach(m => {
                trHead.innerHTML += `<th>${m.Zespol1} vs ${m.Zespol2}</th>`;
            });
            thead.appendChild(trHead);

            // Filtrowanie dubli (od tyłu listy, aby wziąć najnowszy wpis gracza)
            const uniquePlayers = {};
            for (let i = data.length - 1; i >= 0; i--) {
                const row = data[i];
                if (!uniquePlayers[row.Gracz]) {
                    uniquePlayers[row.Gracz] = row;
                }
            }

            // Renderowanie unikalnych graczy w tabeli
            tbody.innerHTML = "";
            Object.values(uniquePlayers).forEach(row => {
                const tr = document.createElement('tr');
                let rowHtml = `<td style="font-weight:bold; color:#01c38d;">${row.Gracz}</td>`;
                activeMatches.forEach(m => {
                    rowHtml += `<td>${row[m.ID] || '-'}</td>`;
                });
                tr.innerHTML = rowHtml;
                tbody.appendChild(tr);
            });
        } catch (error) {
            tbody.innerHTML = "<tr><td colspan='3'>Tabela ruszy po pierwszym zapisie wyników.</td></tr>";
        }
    }
</script>
</body>
</html>
