<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oficjalny Typer Mundial UBICO 2026</title>
    <link rel="icon" type="image/jpeg" href="https://i.ibb.co/Psxd4P4g/UBICO-MUNDIAL.jpg">
    <script src="https://cdn.jsdelivr.net/npm/@twemoji/api@14.1.0/dist/twemoji.min.js" crossorigin="anonymous"></script>
    <style>
        :root { --primary: #01c38d; --bg: #131927; --card: #1e2640; --text: #ffffff; --danger: #ff4a4a; --amber: #ffd700; --blue: #3b82f6; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 600px; width: 100%; box-sizing: border-box; }
        
        .logo-container { text-align: center; margin-bottom: 10px; width: 100%; }
        .logo-container img { max-width: 180px; width: 100%; height: auto; object-fit: containment; }
        
        h1, h2, h3 { text-align: center; color: var(--primary); margin-bottom: 5px; }
        .group-header-active { background: #1a2238; color: var(--primary); font-weight: bold; padding: 12px; border-radius: 6px; margin: 15px 0; text-align: center; font-size: 18px; border: 2px solid var(--primary); }
        .card { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); margin-bottom: 20px; box-sizing: border-box; }
        input, button, select { width: 100%; padding: 12px; margin-top: 10px; border-radius: 6px; border: none; box-sizing: border-box; }
        input[type="text"] { background: #2a3558; color: white; font-size: 16px; text-align: center; }
        
        button { background: var(--primary); color: var(--bg); font-weight: bold; cursor: pointer; font-size: 16px; }
        button:disabled { background: #4a5568; color: #a0aec0; cursor: not-allowed; box-shadow: none !important; }
        button:hover:not(:disabled) { opacity: 0.9; }
        .hidden { display: none !important; }
        
        /* Ekran ładowania (Loader) */
        #loading-screen { text-align: center; padding: 40px 20px; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); width: 42px; height: 42px; border-radius: 50%; border-left-color: var(--primary); animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Wiersze meczy w grupach */
        .match-row { display: flex; align-items: center; justify-content: space-between; margin: 12px 0; padding-bottom: 8px; border-bottom: 1px solid #2a3558; }
        .match-info { display: flex; flex-direction: column; width: 65%; }
        .match-teams { font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .match-date { font-size: 11px; color: #8a99ad; margin-top: 3px; }
        .score-inputs { display: flex; gap: 8px; align-items: center; }
        .score-inputs input { width: 42px; text-align: center; margin: 0; padding: 6px; background: #2a3558; color: white; border: none; border-radius: 4px; font-size: 16px; }
        .score-inputs input:disabled { background: #131927; color: #6c7a9c; cursor: not-allowed; }
        
        /* Kafelki Pucharowe & Wybór Mistrza */
        .teams-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 15px 0; max-height: 380px; overflow-y: auto; padding-right: 5px; }
        .puchar-vs-container { display: flex; flex-direction: column; gap: 15px; margin: 15px 0; }
        .puchar-match-box { background: #1a2238; border: 1px solid #2a3558; padding: 12px; border-radius: 8px; }
        .puchar-match-title { font-size: 11px; color: #8a99ad; text-align: center; margin-bottom: 8px; font-weight: bold; }
        .puchar-tiles-row { display: grid; grid-template-columns: 1fr auto 1fr; gap: 10px; align-items: center; }
        
        .team-tile-btn { background: #2a3558; color: white; border: 2px solid transparent; border-radius: 8px; padding: 12px 5px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; cursor: pointer; font-size: 13px; font-weight: bold; transition: all 0.2s ease; margin: 0; width: 100%; height: auto; }
        .team-tile-btn img.emoji { height: 1.8em; width: 1.8em; margin: 0; }
        .team-tile-btn:hover:not(:disabled) { background: #384775; border-color: #6c7a9c; }
        .team-tile-btn.selected { background: rgba(1, 195, 141, 0.15); border-color: var(--primary); color: var(--primary); box-shadow: 0 0 10px rgba(1, 195, 141, 0.2); }
        .team-tile-btn.selected-winner { background: rgba(255, 215, 0, 0.15); border-color: var(--amber); color: var(--amber); box-shadow: 0 0 10px rgba(255, 215, 0, 0.2); }
        .team-tile-btn:disabled { opacity: 0.7; cursor: not-allowed; }
        
        /* Przełącznik widoku tabel na dole */
        .view-switcher { display: flex; background: #1a2238; padding: 4px; border-radius: 8px; margin-bottom: 15px; gap: 4px; }
        .switch-btn { flex: 1; background: transparent; color: #8a99ad; font-size: 13px; padding: 8px; margin: 0; border-radius: 6px; transition: all 0.2s; }
        .switch-btn.active { background: var(--card); color: white; font-weight: bold; box-shadow: 0 2px 6px rgba(0,0,0,0.15); }
        .switch-btn.active-puchar { border-bottom: 2px solid var(--blue); color: var(--blue); }
        .switch-btn.active-grupa { border-bottom: 2px solid var(--primary); color: var(--primary); }

        .success-box { background: rgba(1, 195, 141, 0.1); border: 2px dashed var(--primary); color: var(--primary); text-align: center; padding: 15px; border-radius: 8px; margin-top: 25px; font-weight: bold; font-size: 16px; }
        img.emoji { height: 1.2em; width: 1.2em; margin: 0 .15em; vertical-align: -0.2em; }
        
        /* Tabele */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; min-width: 1600px; }
        th, td { padding: 12px 8px; text-align: center; border-bottom: 1px solid #2a3558; font-size: 12px; }
        th { color: var(--primary); background: #1a2238; font-weight: 600; vertical-align: middle; }
        
        .cell-exact { background-color: #028a5a !important; color: white !important; font-weight: bold; } 
        .cell-trend { background-color: #b8860b !important; color: white !important; font-weight: bold; } 
        .cell-miss { background-color: #8b0000 !important; color: #ffcccc !important; } 
        .cell-winner { background-color: #d4af37 !important; color: #131927 !important; font-weight: bold; border: 2px solid var(--amber); }

        .leaderboard-table { min-width: 100% !important; }
        .leaderboard-table th, .leaderboard-table td { padding: 10px; font-size: 14px; }
        .leaderboard-row:nth-child(1) { background: rgba(255, 215, 0, 0.15); } 
        .rank-badge { font-weight: bold; display: inline-block; width: 24px; height: 24px; line-height: 24px; border-radius: 50%; background: #2a3558; color: white; text-align: center; font-size: 12px; }
        .leaderboard-row:nth-child(1) .rank-badge { background: #ffd700; color: #131927; }
        .leaderboard-row:nth-child(2) .rank-badge { background: #c0c0c0; color: #131927; }
        .leaderboard-row:nth-child(3) .rank-badge { background: #cd7f32; color: #131927; }

        .progress-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; background: #1a2238; padding: 8px; border-radius: 6px; margin-bottom: 15px; box-sizing: border-box; }
        .progress-step { color: #6c7a9c; background: #131927; cursor: pointer; padding: 10px 0; border-radius: 4px; transition: background 0.2s; text-align: center; font-size: 14px; font-weight: bold; }
        .progress-step:hover { background: #2a3558; color: white; }
        .progress-step.active { color: var(--bg); background: var(--primary); }
        .progress-step.final-step { color: var(--amber); border: 1px dashed var(--amber); }
        .progress-step.final-step.active { color: var(--bg); background: var(--amber); }

        @media (min-width: 500px) {
            .progress-bar.grid-groups { grid-template-columns: repeat(12, 1fr); gap: 4px; }
            .progress-bar.grid-puchar { grid-template-columns: repeat(6, 1fr); gap: 6px; }
            .progress-step { padding: 6px 0; font-size: 11px; }
            .logo-container img { max-width: 240px; }
            .teams-grid { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="https://i.ibb.co/Psxd4P4g/UBICO-MUNDIAL.jpg" alt="Logo Typera">
    </div>

    <h1>🏆 UBICO MUNDIAL 2026 ⚽</h1>

    <div id="loading-screen" class="card">
        <h2 style="color: white; font-size: 18px;">Wczytywanie systemu turniejowego...</h2>
        <div class="spinner"></div>
    </div>

    <div id="login-screen" class="card hidden">
        <h2>Wpisz swój Nick, aby wejść do gry:</h2>
        <input type="text" id="nick-input" placeholder="np. Fabby...">
        <button id="login-btn" onclick="loginUser()">Dołącz do Typera</button>
    </div>

    <div id="app-screen" class="hidden">
        
        <div class="card">
            <h3>Gracz: <span id="user-display" style="color:var(--primary)"></span></h3>
            
            <div class="progress-bar" id="steps-bar"></div>
            <div id="group-title" class="group-header-active"></div>
            
            <div id="matches-list">Ładowanie paneli turniejowych...</div>

            <div id="submit-container"></div>
        </div>

        <div class="card">
            <h2>📊 Szczegółowe Typy i Statystyki</h2>
            
            <div class="view-switcher" id="phase-switcher-container">
                <button class="switch-btn active" id="btn-show-puchar" onclick="switchTableView('PUCHAR')">Faza Pucharowa</button>
                <button class="switch-btn" id="btn-show-grupa" onclick="switchTableView('GRUPA')">🔍 Zobacz archiwalne grupy</button>
            </div>

            <button onclick="loadAllScores()" style="background:#2a3558; color:white; font-size:12px; padding:6px; margin-bottom:15px; width:auto;">🔄 Odśwież dane z bazy</button>
            
            <div class="table-container hidden" id="table-grupa-wrapper">
                <table id="global-table-grupa">
                    <thead id="table-head-grupa"></thead>
                    <tbody id="table-body-grupa"></tbody>
                </table>
            </div>

            <div class="table-container" id="table-puchar-wrapper">
                <table id="global-table-puchar">
                    <thead id="table-head-puchar"></thead>
                    <tbody id="table-body-puchar"></tbody>
                </table>
            </div>
        </div>

        <div class="card">
            <h2>🏆 Klasyfikacja Generalna UBICO</h2>
            <div class="table-container">
                <table class="leaderboard-table">
                    <thead>
                        <tr>
                            <th style="width: 60px;">Poz.</th>
                            <th style="text-align: left; padding-left: 15px;">Gracz</th>
                            <th style="width: 100px;">Punkty (Suma)</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body">
                        <tr><td colspan="3">Obliczanie rankingu...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // =========================================================
    // ⚠️ KONTROLA TRYBU TURNIEJU (Zmień na "PUCHAROWA" po zakończeniu grup)
    const AKTYWNA_FAZA = "GROUPE"; 
    
    // ⚠️ TUTAJ WKLEJ SWÓJ URL Z GOOGLE APPS SCRIPT:
    const API_URL = "https://script.google.com/macros/s/AKfycbwITEYeeJMhwBvCygn9f75aGAmkIfRL8XJV7erXPZYOj84GDMBXgWHLvut7rNXIBag4hA/exec";
    // =========================================================

    let groupsOrder = [];
    let currentGroupIndex = 0; 
    let localDraftScores = {}; 

    const teamFlags = {
        "Meksyk": "🇲🇽", "RPA": "🇿🇦", "Korea Płd.": "🇰🇷", "Czechy": "🇨🇿", "Niemcy": "🇩🇪", "Szwajcaria": "🇨🇭",
        "Hiszpania": "🇪🇸", "Chorwacja": "🇭🇷", "Francja": "🇫🇷", "Portugalia": "🇵🇹", "Brazylia": "🇧🇷", "Argentyna": "🇦🇷",
        "Anglia": "🏴%󠁢󠁥󠁮󠁧󠁿", "Holandia": "🇳🇱", "Włochy": "🇮🇹", "Belgia": "🇧🇪", "Urugwaj": "🇺🇾", "Maroko": "🇲🇦"
    };

    // Faza GROUPE - mecze z Twoimi dotychczasowymi ID (Mecz1, Mecz2 itd.)
    const matchesGrupa = [
        { id: "Mecz1", group: "A", t1: "Meksyk", t2: "RPA", score: "" },
        { id: "Mecz2", group: "A", t1: "Korea Płd.", t2: "Czechy", score: "" }
    ];

    // Faza PUCHAROWA - Pełna lista 32 meczów powiązana z nagłówkami bazy danych!
    const matchesPuchar = [
        // 1/16 Finału (16 meczów)
        { id: "1/16Mecz1", group: "1/16", t1: "Niemcy", t2: "Szwajcaria" },
        { id: "1/16Mecz2", group: "1/16", t1: "Hiszpania", t2: "Chorwacja" },
        { id: "1/16Mecz3", group: "1/16", t1: "Meksyk", t2: "Włochy" },
        { id: "1/16Mecz4", group: "1/16", t1: "Francja", t2: "Belgia" },
        { id: "1/16Mecz5", group: "1/16", t1: "Brazylia", t2: "Urugwaj" },
        { id: "1/16Mecz6", group: "1/16", t1: "Argentyna", t2: "Maroko" },
        { id: "1/16Mecz7", group: "1/16", t1: "Anglia", t2: "Holandia" },
        { id: "1/16Mecz8", group: "1/16", t1: "Korea Płd.", t2: "RPA" },
        { id: "1/16Mecz9", group: "1/16", t1: "Drużyna A", t2: "Drużyna B" },
        { id: "1/16Mecz10", group: "1/16", t1: "Drużyna C", t2: "Drużyna D" },
        { id: "1/16Mecz11", group: "1/16", t1: "Drużyna E", t2: "Drużyna F" },
        { id: "1/16Mecz12", group: "1/16", t1: "Drużyna G", t2: "Drużyna H" },
        { id: "1/16Mecz13", group: "1/16", t1: "Drużyna I", t2: "Drużyna J" },
        { id: "1/16Mecz14", group: "1/16", t1: "Drużyna K", t2: "Drużyna L" },
        { id: "1/16Mecz15", group: "1/16", t1: "Drużyna M", t2: "Drużyna N" },
        { id: "1/16Mecz16", group: "1/16", t1: "Drużyna O", t2: "Drużyna P" },

        // 1/8 Finału (8 meczów)
        { id: "1/8Mecz1", group: "1/8", t1: "Zwycięzca 1", t2: "Zwycięzca 2" },
        { id: "1/8Mecz2", group: "1/8", t1: "Zwycięzca 3", t2: "Zwycięzca 4" },
        { id: "1/8Mecz3", group: "1/8", t1: "Zwycięzca 5", t2: "Zwycięzca 6" },
        { id: "1/8Mecz4", group: "1/8", t1: "Zwycięzca 7", t2: "Zwycięzca 8" },
        { id: "1/8Mecz5", group: "1/8", t1: "Zwycięzca 9", t2: "Zwycięzca 10" },
        { id: "1/8Mecz6", group: "1/8", t1: "Zwycięzca 11", t2: "Zwycięzca 12" },
        { id: "1/8Mecz7", group: "1/8", t1: "Zwycięzca 13", t2: "Zwycięzca 14" },
        { id: "1/8Mecz8", group: "1/8", t1: "Zwycięzca 15", t2: "Zwycięzca 16" },

        // Ćwierćfinały (4 mecze)
        { id: "1/4Mecz1", group: "1/4", t1: "Wygrany 1/8 M1", t2: "Wygrany 1/8 M2" },
        { id: "1/4Mecz2", group: "1/4", t1: "Wygrany 1/8 M3", t2: "Wygrany 1/8 M4" },
        { id: "1/4Mecz3", group: "1/4", t1: "Wygrany 1/8 M5", t2: "Wygrany 1/8 M6" },
        { id: "1/4Mecz4", group: "1/4", t1: "Wygrany 1/8 M7", t2: "Wygrany 1/8 M8" },

        // Półfinały (2 mecze)
        { id: "1/2Mecz1", group: "1/2", t1: "Wygrany 1/4 M1", t2: "Wygrany 1/4 M2" },
        { id: "1/2Mecz2", group: "1/2", t1: "Wygrany 1/4 M3", t2: "Wygrany 1/4 M4" },

        // Finały pocieszenia i główny (2 mecze)
        { id: "MeczO3Miejsce", group: "O 3 MIEJSCE", t1: "Przegrany Półfinału 1", t2: "Przegrany Półfinału 2" },
        { id: "MeczFinalowy", group: "FINAŁ", t1: "Wygrany Półfinału 1", t2: "Wygrany Półfinału 2" },
        
        // Wybór Mistrza Świata (Kafelki z 48 państw)
        { id: "zwyciezca", group: "MISTRZ", t1: "ZWYCIĘZCA MUNDIALU", t2: "" }
    ];

    if (AKTYWNA_FAZA === "GROUPE") {
        groupsOrder = ["A", "B", "C", "D", "E", "F", "G", "H", "I", "J", "K", "L"];
    } else {
        groupsOrder = ["1/16", "1/8", "1/4", "1/2", "FINAŁY", "MISTRZ"];
    }

    function refreshTwemoji() { if (window.twemoji) twemoji.parse(document.body, { folder: 'svg', ext: '.svg' }); }
    function isSectionSubmitted(secName) { const nick = localStorage.getItem('typerNick') || ""; return localStorage.getItem(`submitted_${AKTYWNA_FAZA.toLowerCase()}_${secName.toLowerCase()}_${nick.toLowerCase()}`) === "true"; }

    async function initApp() {
        if (AKTYWNA_FAZA === "GROUPE") {
            document.getElementById('phase-switcher-container').classList.add('hidden');
            switchTableView('GRUPA');
        } else {
            document.getElementById('phase-switcher-container').classList.remove('hidden');
            switchTableView('PUCHAR');
        }
        try { await loadAllScores(); } catch (e) { console.error(e); }
        document.getElementById('loading-screen').classList.add('hidden');
        const savedNick = localStorage.getItem('typerNick');
        if (savedNick) { showApp(savedNick); } else { document.getElementById('login-screen').classList.remove('hidden'); refreshTwemoji(); }
    }
    window.onload = initApp;

    function switchTableView(mode) {
        const btnPuchar = document.getElementById('btn-show-puchar'); const btnGrupa = document.getElementById('btn-show-grupa');
        const wrapPuchar = document.getElementById('table-puchar-wrapper'); const wrapGrupa = document.getElementById('table-grupa-wrapper');
        if (mode === 'PUCHAR') {
            btnPuchar.className = "switch-btn active active-puchar"; btnGrupa.className = "switch-btn";
            wrapPuchar.classList.remove('hidden'); wrapGrupa.classList.add('hidden');
        } else {
            btnGrupa.className = "switch-btn active active-grupa"; btnPuchar.className = "switch-btn";
            wrapGrupa.classList.remove('hidden'); wrapPuchar.classList.add('hidden');
        }
    }

    function loginUser() {
        const nick = document.getElementById('nick-input').value.trim();
        if (nick.length < 3) return alert('Nick musi mieć min. 3 znaki!');
        localStorage.setItem('typerNick', nick);
        document.getElementById('login-screen').classList.add('hidden');
        showApp(nick);
    }

    function showApp(nick) {
        document.getElementById('app-screen').classList.remove('hidden');
        document.getElementById('user-display').innerText = nick;
        renderProgressBar(); renderActiveSection();
    }

    function renderProgressBar() {
        const bar = document.getElementById('steps-bar'); bar.innerHTML = "";
        bar.className = `progress-bar ${AKTYWNA_FAZA === 'GROUPE' ? 'grid-groups' : 'grid-puchar'}`;
        groupsOrder.forEach((g, idx) => {
            const span = document.createElement('span'); const isDone = isSectionSubmitted(g);
            if (g === "MISTRZ") {
                span.className = `progress-step final-step ${idx === currentGroupIndex ? 'active' : ''}`;
                span.innerText = isDone ? `🏆 ✓` : `🏆`;
            } else {
                span.className = `progress-step ${idx === currentGroupIndex ? 'active' : ''}`;
                span.innerText = isDone ? `${g} ✓` : g;
            }
            span.onclick = () => changeSection(idx); bar.appendChild(span);
        });
    }

    function changeSection(targetIndex) { saveCurrentInputsToDraft(); currentGroupIndex = targetIndex; renderProgressBar(); renderActiveSection(); }

    function saveCurrentInputsToDraft() {
        if (AKTYWNA_FAZA === "PUCHAROWA") return;
        const currentLetter = groupsOrder[currentGroupIndex]; if (isSectionSubmitted(currentLetter)) return;
        document.querySelectorAll('.match-row').forEach(row => {
            const id = row.getAttribute('data-id'); const h = row.querySelector('.home-team'); const a = row.querySelector('.away-team');
            if (h && a) { localDraftScores[`home-${id}`] = h.value; localDraftScores[`away-${id}`] = a.value; }
        });
    }

    function selectPucharWinner(matchId, chosenTeam) {
        if (isSectionSubmitted(groupsOrder[currentGroupIndex])) return;
        localDraftScores[`puchar-${matchId}`] = chosenTeam;
        const matchBox = document.getElementById(`box-${matchId}`);
        if (matchBox) {
            matchBox.querySelectorAll('.team-tile-btn').forEach(t => {
                if (t.getAttribute('data-team') === chosenTeam) t.classList.add('selected'); else t.classList.remove('selected');
            });
        }
        validateSectionCompletion();
    }

    function selectFinalWinner(teamName) {
        if (isSectionSubmitted("MISTRZ")) return;
        localDraftScores["final-zwyciezca"] = teamName;
        document.querySelectorAll('.team-tile-btn').forEach(tile => {
            if (tile.getAttribute('data-team') === teamName) tile.classList.add('selected-winner'); else tile.classList.remove('selected-winner');
        });
        validateSectionCompletion();
    }

    function renderActiveSection() {
        const currentSec = groupsOrder[currentGroupIndex]; const container = document.getElementById('matches-list');
        container.innerHTML = ""; const isLocked = isSectionSubmitted(currentSec);

        if (currentSec === "MISTRZ") {
            document.getElementById('group-title').innerText = `👑 TYPER MISTRZA ŚWIATA 2026`;
            document.getElementById('group-title').style.borderColor = "var(--amber)"; document.getElementById('group-title').style.color = "var(--amber)";
            const savedWinner = localDraftScores["final-zwyciezca"] || "";
            let gridHtml = `<div class="teams-grid">`;
            Object.keys(teamFlags).forEach(team => {
                gridHtml += `
                    <button type="button" class="team-tile-btn ${team === savedWinner ? 'selected-winner' : ''}" data-team="${team}" ${isLocked ? 'disabled' : ''} onclick="selectFinalWinner('${team}')">
                        ${teamFlags[team] || ""} <span style="font-size:11px;">${team.substring(0,3).toUpperCase()}</span>
                    </button>`;
            });
            container.innerHTML = `<div style="text-align:center;"><p>Kliknij flagę reprezentacji, która wygra Mundial:</p>${gridHtml}</div>`;
            validateSectionCompletion(); refreshTwemoji(); return;
        }

        if (AKTYWNA_FAZA === "PUCHAROWA") {
            document.getElementById('group-title').innerText = `🔥 FAZA PUCHAROWA — RUNDA: ${currentSec}`;
            document.getElementById('group-title').style.borderColor = "var(--blue)"; document.getElementById('group-title').style.color = "var(--blue)";
            
            // Filtrujemy mecze (dla sekcji "FINAŁY" bierzemy Finał i mecz o 3 miejsce)
            const listMatches = matchesPuchar.filter(m => currentSec === "FINAŁY" ? (m.group === "FINAŁ" || m.group === "O 3 MIEJSCE") : m.group === currentSec);
            const devBox = document.createElement('div'); devBox.className = "puchar-vs-container";

            listMatches.forEach(m => {
                const savedPick = localDraftScores[`puchar-${m.id}`] || "";
                devBox.innerHTML += `
                    <div class="puchar-match-box" id="box-${m.id}">
                        <div class="puchar-match-title">${m.group} — KTÓRA DRUŻYNA WYGRA/AWANSUJE?</div>
                        <div class="puchar-tiles-row">
                            <button type="button" class="team-tile-btn ${savedPick === m.t1 ? 'selected' : ''}" data-team="${m.t1}" ${isLocked ? 'disabled' : ''} onclick="selectPucharWinner('${m.id}', '${m.t1}')">
                                ${teamFlags[m.t1] || "🏳️"} <span>${m.t1}</span>
                            </button>
                            <b style="color:#8a99ad; font-size:12px;">VS</b>
                            <button type="button" class="team-tile-btn ${savedPick === m.t2 ? 'selected' : ''}" data-team="${m.t2}" ${isLocked ? 'disabled' : ''} onclick="selectPucharWinner('${m.id}', '${m.t2}')">
                                ${teamFlags[m.t2] || "🏳️"} <span>${m.t2}</span>
                            </button>
                        </div>
                    </div>`;
            });
            container.appendChild(devBox); validateSectionCompletion(); refreshTwemoji(); return;
        }

        // FAZA GRUPOWA
        document.getElementById('group-title').style.borderColor = "var(--primary)"; document.getElementById('group-title').style.color = "var(--primary)";
        document.getElementById('group-title').innerText = `🏆 FAZA GRUPOWA — GRUPA ${currentSec}`;
        const listMatches = matchesGrupa.filter(m => m.group === currentSec);
        listMatches.forEach(match => {
            const div = document.createElement('div'); div.className = "match-row"; div.setAttribute('data-id', match.id);
            const sh = localDraftScores[`home-${match.id}`] || ""; const sa = localDraftScores[`away-${match.id}`] || "";
            div.innerHTML = `
                <div class="match-info"><span class="match-teams">${teamFlags[match.t1] || ""} ${match.t1} - ${teamFlags[match.t2] || ""} ${match.t2}</span></div>
                <div class="score-inputs">
                    <input type="number" class="home-team" value="${sh}" ${isLocked ? 'disabled' : ''} oninput="saveCurrentInputsToDraft(); validateSectionCompletion();">
                    <span>:</span>
                    <input type="number" class="away-team" value="${sa}" ${isLocked ? 'disabled' : ''} oninput="saveCurrentInputsToDraft(); validateSectionCompletion();">
                </div>`;
            container.appendChild(div);
        });
        validateSectionCompletion(); refreshTwemoji();
    }

    function validateSectionCompletion() {
        const currentSec = groupsOrder[currentGroupIndex]; const submitContainer = document.getElementById('submit-container');
        if (isSectionSubmitted(currentSec)) { submitContainer.innerHTML = `<div class="success-box">⭐ Sekcja wysłana do bazy!</div>`; return; }
        submitContainer.innerHTML = `<button id="submit-btn" onclick="submitCurrentSection()" disabled>Wypełnij pola sekcji</button>`;
        const btn = document.getElementById('submit-btn');

        if (currentSec === "MISTRZ") {
            const win = localDraftScores["final-zwyciezca"] || "";
            if(win) { btn.removeAttribute('disabled'); btn.innerText = `💾 Zatwierdź Mistrza: ${win.toUpperCase()}`; btn.style.background = "var(--amber)"; }
            return;
        }
        if (AKTYWNA_FAZA === "PUCHAROWA") {
            const listMatches = matchesPuchar.filter(m => currentSec === "FINAŁY" ? (m.group === "FINAŁ" || m.group === "O 3 MIEJSCE") : m.group === currentSec);
            if (listMatches.every(m => (localDraftScores[`puchar-${m.id}`] || "") !== "")) {
                btn.removeAttribute('disabled'); btn.innerText = "💾 Zapisz mecze pucharowe"; btn.style.background = "var(--blue)"; btn.style.color = "#fff";
            }
            return;
        }
        let allFilled = document.querySelectorAll('.match-row').length > 0;
        document.querySelectorAll('.match-row').forEach(r => { const i = r.querySelectorAll('input'); if(i[0].value === "" || i[1].value === "") allFilled = false; });
        if (allFilled) btn.removeAttribute('disabled');
    }

    async function submitCurrentSection() {
        const currentSec = groupsOrder[currentGroupIndex]; const nick = localStorage.getItem('typerNick');
        let payload = { Gracz: nick, faza: AKTYWNA_FAZA };

        if (currentSec === "MISTRZ") {
            payload["zwyciezca"] = localDraftScores["final-zwyciezca"];
        } else if (AKTYWNA_FAZA === "PUCHAROWA") {
            const listMatches = matchesPuchar.filter(m => currentSec === "FINAŁY" ? (m.group === "FINAŁ" || m.group === "O 3 MIEJSCE") : m.group === currentSec);
            listMatches.forEach(m => { payload[m.id] = localDraftScores[`puchar-${m.id}`]; });
        } else {
            const listMatches = matchesGrupa.filter(m => m.group === currentSec);
            listMatches.forEach(m => { payload[m.id] = `${localDraftScores[`home-${m.id}`]}:${localDraftScores[`away-${m.id}`]}`; });
        }

        try {
            // TUTAJ NASTĘPUJE REALNA WYSYŁKA DO TWOJEGO GOOGLE SHEETS
            // await fetch(API_URL, { method: "POST", body: new URLSearchParams(payload) });
            localStorage.setItem(`submitted_${AKTYWNA_FAZA.toLowerCase()}_${currentSec.toLowerCase()}_${nick.toLowerCase()}`, "true");
            alert(`Zapisano pomyślnie w bazie sekcję: ${currentSec}! 🎉`);
            if (currentGroupIndex < groupsOrder.length - 1) currentGroupIndex++;
            renderProgressBar(); renderActiveSection();
        } catch (e) { alert("Błąd wysyłki danych!"); }
    }

    async function loadAllScores() {
        // MAKIETY DANYCH DLA TRYBU TESTOWEGO
        document.getElementById('table-head-grupa').innerHTML = `<tr><th>Gracz</th><th>Mecz1</th><th>Mecz2</th></tr>`;
        document.getElementById('table-body-grupa').innerHTML = `<tr><td style="color:var(--primary)">Gracz_Testowy</td><td class="cell-exact">2:1</td><td>-</td></tr>`;
        
        document.getElementById('table-head-puchar').innerHTML = `<tr><th>Gracz</th><th>1/16Mecz1</th><th>MeczFinalowy</th><th style="color:var(--amber)">zwyciezca</th></tr>`;
        document.getElementById('table-body-puchar').innerHTML = `<tr><td style="color:var(--blue)">Gracz_Testowy</td><td class="cell-exact">Niemcy</td><td>Hiszpania</td><td class="cell-winner">Brazylia</td></tr>`;
        
        document.getElementById('leaderboard-body').innerHTML = `<tr class="leaderboard-row"><td><span class="rank-badge">1</span></td><td style="text-align:left; padding-left:15px;">Gracz_Testowy</td><td style="color:var(--primary); font-weight:bold;">25 pkt</td></tr>`;
        refreshTwemoji();
    }
</script>
</body>
</html>
