<!DOCTYPE html>
<html lang="pl">
<head>

        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 600px; width: 100%; box-sizing: border-box; }
        
        .logo-container { text-align: center; margin-bottom: 10px; width: 100%; }
        .logo-container img { max-width: 180px; width: 100%; height: auto; object-fit: containment; }
        
        h1, h2, h3 { text-align: center; color: var(--primary); margin-bottom: 5px; }
        .group-header-active { background: #1a2238; color: var(--primary); font-weight: bold; padding: 12px; border-radius: 6px; margin: 15px 0; text-align: center; font-size: 18px; border: 2px solid var(--primary); }
        .card { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); margin-bottom: 20px; box-sizing: border-box; }
        input, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 6px; border: none; box-sizing: border-box; }
        input[type="text"] { background: #2a3558; color: white; font-size: 16px; text-align: center; }
        button { background: var(--primary); color: var(--bg); font-weight: bold; cursor: pointer; font-size: 16px; }
        button:disabled { background: #4a5568; color: #a0aec0; cursor: not-allowed; box-shadow: none !important; }
        button:hover:not(:disabled) { opacity: 0.9; }
        .hidden { display: none !important; }
        
        /* Loader */
        #loading-screen { text-align: center; padding: 40px 20px; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); width: 42px; height: 42px; border-radius: 50%; border-left-color: var(--primary); animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Wiersze meczów grupowych */
        .match-row { display: flex; align-items: center; justify-content: space-between; margin: 12px 0; padding-bottom: 8px; border-bottom: 1px solid #2a3558; }
        .match-info { display: flex; flex-direction: column; width: 65%; }
        .match-teams { font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .match-date { font-size: 11px; color: #8a99ad; margin-top: 3px; }
        .locked-text { color: var(--danger); font-weight: bold; }
        .submitted-text { color: var(--primary); font-weight: bold; }
        .score-inputs { display: flex; gap: 8px; align-items: center; }
        .score-inputs input { width: 42px; text-align: center; margin: 0; padding: 6px; background: #2a3558; color: white; border: none; border-radius: 4px; font-size: 16px; }
        .score-inputs input:disabled { background: #131927; color: #6c7a9c; cursor: not-allowed; }
        
        /* Kafelki Fazy Pucharowej i Mistrza */
        .teams-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 15px 0; max-height: 380px; overflow-y: auto; padding-right: 5px; }
        .puchar-vs-container { display: flex; flex-direction: column; gap: 15px; margin: 15px 0; }
        .puchar-match-box { background: #1a2238; border: 1px solid #2a3558; padding: 12px; border-radius: 8px; }
        .puchar-match-title { font-size: 11px; color: #8a99ad; text-align: center; margin-bottom: 8px; font-weight: bold; }
        .puchar-tiles-row { display: grid; grid-template-columns: 1fr auto 1fr; gap: 10px; align-items: center; }
        
        .team-tile-btn { background: #2a3558; color: white; border: 2px solid transparent; border-radius: 8px; padding: 12px 5px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; cursor: pointer; font-size: 13px; font-weight: bold; transition: all 0.2s ease; margin: 0; width: 100%; height: auto; }
        .team-tile-btn img.emoji { height: 1.8em; width: 1.8em; margin: 0; }
        .team-tile-btn:hover:not(:disabled) { background: #384775; border-color: #6c7a9c; }
        .team-tile-btn.selected { background: rgba(59, 130, 246, 0.15); border-color: var(--blue); color: var(--blue); box-shadow: 0 0 10px rgba(59, 130, 246, 0.2); }
        .team-tile-btn.selected-winner { background: rgba(255, 215, 0, 0.15); border-color: var(--amber); color: var(--amber); box-shadow: 0 0 10px rgba(255, 215, 0, 0.2); }
        .team-tile-btn:disabled { opacity: 0.7; cursor: not-allowed; }

        /* Przełącznik tabel archiwalnych */
        .view-switcher { display: flex; background: #1a2238; padding: 4px; border-radius: 8px; margin-bottom: 15px; gap: 4px; }
        .switch-btn { flex: 1; background: transparent; color: #8a99ad; font-size: 13px; padding: 8px; margin: 0; border-radius: 6px; transition: all 0.2s; cursor: pointer; border: none; }
        .switch-btn.active { background: var(--card); color: white; font-weight: bold; box-shadow: 0 2px 6px rgba(0,0,0,0.15); }
        .switch-btn.active-puchar { border-bottom: 2px solid var(--blue); color: var(--blue); }
        .switch-btn.active-grupa { border-bottom: 2px solid var(--primary); color: var(--primary); }

        .success-box { background: rgba(1, 195, 141, 0.1); border: 2px dashed var(--primary); color: var(--primary); text-align: center; padding: 15px; border-radius: 8px; margin-top: 25px; font-weight: bold; font-size: 16px; }
        img.emoji { height: 1.2em; width: 1.2em; margin: 0 .15em; vertical-align: -0.2em; }
        
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; min-width: 1600px; }
        th, td { padding: 12px 8px; text-align: center; border-bottom: 1px solid #2a3558; font-size: 12px; }
        th { color: var(--primary); background: #1a2238; font-weight: 600; vertical-align: middle; }
        .th-match-header { font-size: 11px; font-weight: bold; color: white; white-space: nowrap; min-width: 90px; text-align: center; letter-spacing: 0.5px; display: flex; align-items: center; justify-content: center; gap: 4px; }
        
        .cell-exact { background-color: #028a5a !important; color: white !important; font-weight: bold; } 
        .cell-trend { background-color: #b8860b !important; color: white !important; font-weight: bold; } 
        .cell-miss { background-color: #8b0000 !important; color: #ffcccc !important; } 
        .cell-winner { background-color: #d4af37 !important; color: #131927 !important; font-weight: bold; border: 2px solid var(--amber); }

        .leaderboard-table { min-width: 100% !important; }
        .leaderboard-table th, .leaderboard-table td { padding: 10px; font-size: 14px; }
        .leaderboard-row:nth-child(1) { background: rgba(255, 215, 0, 0.15); } 
        .rank-badge { font-weight: bold; display: inline-block; width: 24px; height: 24px; line-height: 24px; border-radius: 50%; background: #2a3558; color: white; text-align: center; font-size: 12px; }
        .leaderboard-row:nth-child(1) .rank-badge { background: #ffd700; color: #131927; }
        .leaderboard-row:nth-child(2) .rank-badge { background: #c0c0c0; color: #131927; }
        .leaderboard-row:nth-child(3) .rank-badge { background: #cd7f32; color: #131927; }
        .stats-span { font-size: 11px; color: #8a99ad; margin-left: 5px; font-weight: normal; }

        .progress-bar { display: grid; gap: 6px; background: #1a2238; padding: 8px; border-radius: 6px; margin-bottom: 15px; box-sizing: border-box; }
        .progress-step { color: #6c7a9c; background: #131927; cursor: pointer; padding: 10px 0; border-radius: 4px; transition: background 0.2s; text-align: center; font-size: 14px; font-weight: bold; }
        .progress-step:hover { background: #2a3558; color: white; }
        .progress-step.active { color: var(--bg); background: var(--primary); }
        .progress-step.final-step { color: var(--amber); border: 1px dashed var(--amber); }
        .progress-step.final-step.active { color: var(--bg); background: var(--amber); }

        .grid-groups { grid-template-columns: repeat(4, 1fr); }

            .grid-puchar { grid-template-columns: repeat(6, 1fr); gap: 6px; }
            .progress-step { padding: 6px 0; font-size: 12px; }

        if (window.twemoji) {

    function isSectionSubmittedByPlayer(secName) {
        const nick = localStorage.getItem('typerNick') || "";
        return localStorage.getItem(`submitted_${AKTYWNA_FAZA.toLowerCase()}_${secName.toLowerCase()}_${nick.toLowerCase()}`) === "true";

    async function initApp() {
        if (AKTYWNA_FAZA === "GROUPE") {
            document.getElementById('phase-switcher-container').classList.add('hidden');
            document.getElementById('table-card-title').innerText = "📊 Szczegółowe Typy Graczy (Faza Grupowa)";
            currentTableMode = "GRUPA";
        } else {
            document.getElementById('phase-switcher-container').classList.remove('hidden');
            document.getElementById('table-card-title').innerText = "📊 Statystyki i Szczegółowe Wyniki";
            currentTableMode = "PUCHAR";
        }

        try {
            await loadAllScores(); 
        } catch (e) {
            console.error("Ignorowany błąd pobierania bazy przy starcie:", e);
        }

        document.getElementById('loading-screen').classList.add('hidden');
        const savedNick = localStorage.getItem('typerNick');

        if (savedNick) { 
            showApp(savedNick); 
        } else {
            document.getElementById('login-screen').classList.remove('hidden');
            refreshTwemoji();
        }
    }

    window.onload = initApp;

    function switchTableView(mode) {
        const btnPuchar = document.getElementById('btn-show-puchar');
        const btnGrupa = document.getElementById('btn-show-grupa');
        if (mode === 'PUCHAR') {
            btnPuchar.className = "switch-btn active active-puchar";
            btnGrupa.className = "switch-btn";
            currentTableMode = "PUCHAR";
        } else {
            btnGrupa.className = "switch-btn active active-grupa";
            btnPuchar.className = "switch-btn";
            currentTableMode = "GRUPA";
        }
        buildGlobalTable();
    }

    function loginUser() {
        const nickInput = document.getElementById('nick-input');
        const nick = nickInput.value.trim();
        if (nick.length < 3) return alert('Nick musi mieć min. 3 znaki!');

        localStorage.setItem('typerNick', nick);
        document.getElementById('login-screen').classList.add('hidden');
        showApp(nick);
    }

    function showApp(nick) {
        document.getElementById('app-screen').classList.remove('hidden');
        document.getElementById('user-display').innerText = nick;
        
        fillLocalDraftFromDatabase(nick);
        renderProgressBar();
        renderActiveSection();
    }

    function fillLocalDraftFromDatabase(nick) {
        if (!existingDatabaseRows || existingDatabaseRows.length === 0) return;
        const userRow = existingDatabaseRows.find(r => r.gracz && r.gracz.toLowerCase() === nick.toLowerCase());
        if (userRow) {
            if (AKTYWNA_FAZA === "GROUPE") {
                groupsOrder.forEach(g => {
                    const groupMatches = allMatches.filter(m => m.group === g);
                    let hasAtLeastOnePrediction = false;
                    groupMatches.forEach(m => {
                        const matchKey = m.id.toLowerCase();
                        const score = userRow[matchKey]; 
                        if (score && score.includes(":")) {
                            const parts = score.split(":");
                            localDraftScores[`home-${m.id}`] = parts[0].trim();
                            localDraftScores[`away-${m.id}`] = parts[1].trim();
                            hasAtLeastOnePrediction = true;
                        }
                    });
                    if (hasAtLeastOnePrediction) {
                        localStorage.setItem(`submitted_groupe_${g.toLowerCase()}_${nick.toLowerCase()}`, "true");
                    }
                });
            } else {
                groupsOrder.forEach(g => {
                    const roundMatches = matchesPuchar.filter(m => m.group === g);
                    let hasAtLeastOnePrediction = false;
                    roundMatches.forEach(m => {
                        const matchKey = m.id.toLowerCase();
                        const val = userRow[matchKey];
                        if (val && val.trim() !== "") {
                            if (g === "MISTRZ") {
                                localDraftScores["final-zwyciezca"] = val.trim();
                            } else {
                                localDraftScores[`puchar-${m.id}`] = val.trim();
                            }
                            hasAtLeastOnePrediction = true;
                        }
                    });
                    if (hasAtLeastOnePrediction) {
                        localStorage.setItem(`submitted_pucharowa_${g.toLowerCase()}_${nick.toLowerCase()}`, "true");
                    }
                });
            }
        }
    }

    function renderProgressBar() {
        const bar = document.getElementById('steps-bar');
        bar.innerHTML = "";
        bar.className = `progress-bar ${AKTYWNA_FAZA === 'GROUPE' ? 'grid-groups' : 'grid-puchar'}`;
        groupsOrder.forEach((g, idx) => {
            const span = document.createElement('span');
            const isDone = isSectionSubmittedByPlayer(g);
            if (g === "MISTRZ") {
                span.className = `progress-step final-step ${idx === currentGroupIndex ? 'active' : ''}`;
                span.innerText = isDone ? `🏆 ✓` : `🏆`;
            } else {
                span.className = `progress-step ${idx === currentGroupIndex ? 'active' : ''}`;
                span.innerText = isDone ? `${g} ✓` : g; 
            }
            span.onclick = () => changeSection(idx);
            bar.appendChild(span);
        });
    }

    function changeSection(targetIndex) {
        saveCurrentInputsToDraft();
        currentGroupIndex = targetIndex;
        renderProgressBar();
        renderActiveSection();
    }

    function saveCurrentInputsToDraft() {
        const currentSec = groupsOrder[currentGroupIndex];
        if (isSectionSubmittedByPlayer(currentSec)) return;

        if (AKTYWNA_FAZA === "PUCHAROWA") return; // Dla pucharów zapis następuje od razu w zdarzeniu click

        const rows = document.querySelectorAll('.match-row');
        rows.forEach(row => {
            const id = row.getAttribute('data-id');
            const isLocked = row.getAttribute('data-locked') === "true";
            if (!isLocked) {
                const homeInput = row.querySelector('.home-team');
                const awayInput = row.querySelector('.away-team');
                if(homeInput && awayInput) {
                    localDraftScores[`home-${id}`] = homeInput.value;
                    localDraftScores[`away-${id}`] = awayInput.value;
                }
            }
        });
    }

    function selectPucharWinner(matchId, chosenTeam) {
        const currentSec = groupsOrder[currentGroupIndex];
        if (isSectionSubmittedByPlayer(currentSec)) return;
        localDraftScores[`puchar-${matchId}`] = chosenTeam;
        const matchBox = document.getElementById(`box-${matchId}`);
        if (matchBox) {
            matchBox.querySelectorAll('.team-tile-btn').forEach(t => {
                if (t.getAttribute('data-team') === chosenTeam) t.classList.add('selected'); else t.classList.remove('selected');
            });
        }
        validateSectionCompletion();
    }

    function selectFinalWinner(teamName) {
        if (isSectionSubmittedByPlayer("MISTRZ")) return;
        localDraftScores["final-zwyciezca"] = teamName;
        document.querySelectorAll('.team-tile-btn').forEach(tile => {
            if (tile.getAttribute('data-team') === teamName) tile.classList.add('selected-winner'); else tile.classList.remove('selected-winner');
        });
        validateSectionCompletion();
    }

    function renderActiveSection() {
        const currentSec = groupsOrder[currentGroupIndex];
        const container = document.getElementById('matches-list');
        container.innerHTML = "";
        const now = new Date();
        const isLockedPermanently = isSectionSubmittedByPlayer(currentSec);

        // MODUŁ PUCHAROWY: TYPER MISTRZA
        if (currentSec === "MISTRZ") {
            document.getElementById('group-title').innerText = `👑 TYPER MISTRZA ŚWIATA 2026`;
            document.getElementById('group-title').style.borderColor = "var(--amber)"; 
            document.getElementById('group-title').style.color = "var(--amber)";
            
            const savedWinner = localDraftScores["final-zwyciezca"] || "";
            let gridHtml = `<div class="teams-grid">`;
            Object.keys(teamFlags).forEach(team => {
                gridHtml += `
                    <button type="button" class="team-tile-btn ${team === savedWinner ? 'selected-winner' : ''}" data-team="${team}" ${isLockedPermanently ? 'disabled' : ''} onclick="selectFinalWinner('${team}')">
                        ${teamFlags[team] || ""} <span style="font-size:11px;">${team.substring(0,3).toUpperCase()}</span>
                    </button>`;
            });
            gridHtml += `</div>`;
            
            let statusMsg = isLockedPermanently ? '<span class="submitted-text">🔒 WYBÓR ZATWIERDZONY</span>' : '⏰ Wybierz końcowego triumfatora turnieju przed startem fazy';
            container.innerHTML = `
                <div style="text-align:center; padding-bottom:10px;">
                    <p style="margin:5px 0; font-size:13px; color:#8a99ad;">${statusMsg}</p>
                    ${gridHtml}
                </div>`;
            validateSectionCompletion(); 
            refreshTwemoji(); 
            return;
        }

        // MODUŁ PUCHAROWY: DRABINKI VS KAFELKI
        if (AKTYWNA_FAZA === "PUCHAROWA") {
            document.getElementById('group-title').innerText = `🔥 FAZA PUCHAROWA — RUNDA: ${currentSec}`;
            document.getElementById('group-title').style.borderColor = "var(--blue)"; 
            document.getElementById('group-title').style.color = "var(--blue)";
            
            const listMatches = matchesPuchar.filter(m => m.group === currentSec);
            const devBox = document.createElement('div'); 
            devBox.className = "puchar-vs-container";

            listMatches.forEach(m => {
                const savedPick = localDraftScores[`puchar-${m.id}`] || "";
                let statusMessage = isLockedPermanently ? '<span class="submitted-text">🔒 ZABLOKOWANY (Wysłano)</span>' : '⏰ Wybierz zespół przechodzący dalej';
                
                devBox.innerHTML += `
                    <div class="puchar-match-box" id="box-${m.id}">
                        <div class="puchar-match-title">${statusMessage}</div>
                        <div class="puchar-tiles-row">
                            <button type="button" class="team-tile-btn ${savedPick === m.t1 ? 'selected' : ''}" data-team="${m.t1}" ${isLockedPermanently ? 'disabled' : ''} onclick="selectPucharWinner('${m.id}', '${m.t1}')">
                                ${teamFlags[m.t1] || "🏳️"} <span>${m.t1}</span>
                            </button>
                            <b style="color:#8a99ad; font-size:12px;">VS</b>
                            <button type="button" class="team-tile-btn ${savedPick === m.t2 ? 'selected' : ''}" data-team="${m.t2}" ${isLockedPermanently ? 'disabled' : ''} onclick="selectPucharWinner('${m.id}', '${m.t2}')">
                                ${teamFlags[m.t2] || "🏳️"} <span>${m.t2}</span>
                            </button>
                        </div>
                    </div>`;
            });
            container.appendChild(devBox); 
            validateSectionCompletion(); 
            refreshTwemoji(); 
            return;
        }

        // ORYGINALNY MODUŁ FAZY GRUPOWEJ
        document.getElementById('group-title').style.borderColor = "var(--primary)"; 
        document.getElementById('group-title').style.color = "var(--primary)";
        document.getElementById('group-title').innerText = `🏆 FAZA GRUPOWA — GRUPA ${currentSec}`;
        
        const groupMatches = allMatches.filter(m => m.group === currentSec);

        groupMatches.forEach((match, index) => {
            const lockTime = new Date(match.lock);
            const isLocked = (now >= lockTime) || isLockedPermanently;

            const div = document.createElement('div');
            div.className = "match-row";
            div.setAttribute('data-id', match.id);
            div.setAttribute('data-locked', isLocked);
            
            const nextMatch = groupMatches[index + 1];
            const nextMatchId = nextMatch ? nextMatch.id : null;

            const savedHome = localDraftScores[`home-${match.id}`] || "";
            const savedAway = localDraftScores[`away-${match.id}`] || "";

            const f1 = teamFlags[match.t1] || "";
            const f2 = teamFlags[match.t2] || "";

            let officialResultText = "";
            if(match.score && match.score !== "") {
                officialResultText = ` <b style="color:var(--primary)">[Wynik: ${match.score}]</b>`;
            }

            let statusMessage = '⏰ Start PL: ' + match.lock.replace('T', ' ');
            if (now >= lockTime) {
                statusMessage = '<span class="locked-text">🔒 ZABLOKOWANY (Czas minął)</span>';
            } else if (isLockedPermanently) {
                statusMessage = '<span class="submitted-text">🔒 ZABLOKOWANY (Wysłano)</span>';
            }

            div.innerHTML = `
                <div class="match-info">
                    <span class="match-teams">${f1} ${match.t1} - ${f2} ${match.t2} ${officialResultText}</span>
                    <span class="match-date">${statusMessage}</span>
                </div>
                <div class="score-inputs">
                    <input type="number" class="home-team" id="home-${match.id}" min="0" placeholder="-" value="${savedHome}" ${isLocked ? 'disabled' : ''} oninput="handleHomeInput('${match.id}')">
                    <span>:</span>
                    <input type="number" class="away-team" id="away-${match.id}" min="0" placeholder="-" value="${savedAway}" ${isLocked ? 'disabled' : ''} oninput="handleAwayInput('${match.id}', '${nextMatchId}')">
                </div>
            `;
            container.appendChild(div);
        });

        validateSectionCompletion();
        refreshTwemoji(); 
    }

    function handleHomeInput(matchId) {
        const homeInput = document.getElementById(`home-${matchId}`);
        if (homeInput && homeInput.value !== "") {
            const awayInput = document.getElementById(`away-${matchId}`);
            if(awayInput) awayInput.focus();
        }
        saveCurrentInputsToDraft();
        validateSectionCompletion();
    }

    function handleAwayInput(currentMatchId, nextMatchId) {
        const awayInput = document.getElementById(`away-${currentMatchId}`);
        if (awayInput && awayInput.value !== "" && nextMatchId) {
            const nextHomeInput = document.getElementById(`home-${nextMatchId}`);
            if (nextHomeInput && !nextHomeInput.disabled) { nextHomeInput.focus(); }
        }
        saveCurrentInputsToDraft();
        validateSectionCompletion();
    }

    function validateSectionCompletion() {
        const currentSec = groupsOrder[currentGroupIndex];
        const submitContainer = document.getElementById('submit-container');

        if (isSectionSubmittedByPlayer(currentSec)) {
            submitContainer.innerHTML = `<div class="success-box">⭐ Ta sekcja została już przez Ciebie zatwierdzona i zablokowana!</div>`;
            return;
        }

        submitContainer.innerHTML = `
            <button id="submit-btn" onclick="submitCurrentSection()" style="margin-top: 25px; font-size: 18px; box-shadow: 0 4px 10px rgba(1, 195, 141, 0.3);" disabled>
                Wypełnij wszystkie pola sekcji
            </button>
        `;

        const btn = document.getElementById('submit-btn');
        if (!btn) return;

        if (currentSec === "MISTRZ") {
            const win = localDraftScores["final-zwyciezca"] || "";
            if (win) {
                btn.removeAttribute('disabled');
                btn.innerText = `💾 Zatwierdź Mistrza: ${win.toUpperCase()}`;
                btn.style.background = "var(--amber)";
            } else {
                btn.setAttribute('disabled', 'true');
                btn.innerText = "Wskaż zwycięzcę turnieju, aby zapisać";
            }
            return;
        }

        if (AKTYWNA_FAZA === "PUCHAROWA") {
            const listMatches = matchesPuchar.filter(m => m.group === currentSec);
            let allPicked = listMatches.every(m => (localDraftScores[`puchar-${m.id}`] || "") !== "");
            if (allPicked) {
                btn.removeAttribute('disabled');
                btn.innerText = "💾 Zapisz mecze pucharowe";
                btn.style.background = "var(--blue)";
                btn.style.color = "#fff";
            } else {
                btn.setAttribute('disabled', 'true');
                btn.innerText = "Wybierz faworyta z każdej pary tej rundy";
            }
            return;
        }

        // Walidacja grupowa
        const rows = document.querySelectorAll('.match-row');
        let allFilled = true;
        rows.forEach(row => {
            const isLocked = row.getAttribute('data-locked') === "true";
            if (!isLocked) {
                const homeInput = row.querySelector('.home-team');
                const awayInput = row.querySelector('.away-team');
                if (homeInput && awayInput && (homeInput.value === "" || awayInput.value === "")) {
                    allFilled = false;
                }
            }
        });

        if (allFilled) {
            btn.removeAttribute('disabled');
            btn.innerText = currentGroupIndex === groupsOrder.length - 1 ? "💾 Zapisz i Zakończ Typowanie!" : `💾 Zapisz i przejdź do Grupy/Rundy ${groupsOrder[currentGroupIndex + 1]}`;
        } else {
            btn.setAttribute('disabled', 'true');
            btn.innerText = "Wpisz wszystkie otwarte wyniki tej grupy, aby przejść dalej";
        }
    }

    async function submitCurrentSection() {
        const currentSec = groupsOrder[currentGroupIndex];
        const nick = localStorage.getItem('typerNick');

        if (isSectionSubmittedByPlayer(currentSec)) return;
        saveCurrentInputsToDraft();

        // INTEGRACJA STRUKTURY: Zamiast sztywnych kluczy budujemy strukturę pod dynamiczny skrypt Google Apps Script
        const updateData = { "gracz": nick, "faza": AKTYWNA_FAZA };

        if (currentSec === "MISTRZ") {
            updateData["zwyciezca"] = localDraftScores["final-zwyciezca"];
        } else if (AKTYWNA_FAZA === "PUCHAROWA") {
            const listMatches = matchesPuchar.filter(m => m.group === currentSec);
            listMatches.forEach(m => {
                updateData[m.id.toLowerCase()] = localDraftScores[`puchar-${m.id}`] || "";
            });
        } else {
            // Faza grupowa: przesyłamy stan wszystkich meczów
            allMatches.forEach(m => {
                const matchKey = m.id.toLowerCase();
                const homeVal = localDraftScores[`home-${m.id}`];
                const awayVal = localDraftScores[`away-${m.id}`];
                if (homeVal !== undefined && awayVal !== undefined && homeVal !== "" && awayVal !== "") {
                    updateData[matchKey] = `${homeVal}:${awayVal}`;
                } else {
                    updateData[matchKey] = ""; 
                }
            });
        }

        const btn = document.getElementById('submit-btn');

        try {
            if (btn) {
                btn.setAttribute('disabled', 'true');
                btn.innerText = "Wysyłanie do bazy...";
            }

            const res = await fetch(API_URL, {
                method: 'POST',
                body: new URLSearchParams(updateData)
            });
            
            const responseData = await res.json();

            if (responseData.status === "error") {
                throw new Error(responseData.message || "Błąd wewnętrzny bazy Google Sheets");
            }

            localStorage.setItem(`submitted_${AKTYWNA_FAZA.toLowerCase()}_${currentSec.toLowerCase()}_${nick.toLowerCase()}`, "true");

            const indexToUpdate = existingDatabaseRows.findIndex(r => r.gracz && r.gracz.toLowerCase() === nick.toLowerCase());
            if(indexToUpdate !== -1) {
                Object.assign(existingDatabaseRows[indexToUpdate], updateData);
            } else {
                existingDatabaseRows.push(updateData);
            }

            if (currentGroupIndex < groupsOrder.length - 1) {
                alert(`Sekcja ${groupsOrder[currentGroupIndex]} została pomyślnie zapisana w bazie! 🚀`);
                currentGroupIndex++;
                renderProgressBar(); 
                renderActiveSection(); 
                try { await loadAllScores(); } catch(e){}
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                alert("Wszystkie sekcje tego etapu zostały oficjalnie zapisane! Powodzenia! 🎉");
                renderProgressBar(); 
                renderActiveSection();
                try { await loadAllScores(); } catch(e){}
            }
        } catch (e) {
            alert("Błąd podczas zapisywania: " + e.message);
            validateSectionCompletion();
        }
    }

    async function loadAllScores() {
        try {
            const response = await fetch(`${API_URL}?cacheBuster=${Date.now()}`);
            const data = await response.json();
            existingDatabaseRows = data.rows || [];
            buildGlobalTable();
            calculateLeaderboard();
        } catch (e) {
            console.error("Błąd ładowania danych z bazy:", e);
        }
    }

    function buildGlobalTable() {
        const thead = document.getElementById('table-head');
        const tbody = document.getElementById('table-body');
        thead.innerHTML = "";
        tbody.innerHTML = "";

        if (currentTableMode === "GRUPA") {
            // Generowanie nagłówka tabeli grupowej
            let headHtml = `<tr><th>Gracz</th>`;
            allMatches.forEach(m => {
                headHtml += `<th><div class="th-match-header">${getFlagAnd3LetterCode(m.t1)} vs ${getFlagAnd3LetterCode(m.t2)}</div></th>`;
            });
            headHtml += `</tr>`;
            thead.innerHTML = headHtml;

            // Wypełnianie wierszy graczy
            existingDatabaseRows.forEach(row => {
                let rowHtml = `<tr><td style="font-weight:bold; color:var(--primary); background:#1a2238;">${row.gracz || "Anonim"}</td>`;
                allMatches.forEach(m => {
                    const pred = row[m.id.toLowerCase()] || "-";
                    let cellClass = "";
                    
                    if (m.score && m.score !== "" && pred !== "-") {
                        const scorePoints = getMatchPoints(pred, m.score);
                        if (scorePoints === 3) cellClass = 'class="cell-exact"';
                        else if (scorePoints === 1) cellClass = 'class="cell-trend"';
                        else cellClass = 'class="cell-miss"';
                    }
                    rowHtml += `<td ${cellClass}>${pred}</td>`;
                });
                rowHtml += `</tr>`;
                tbody.innerHTML += rowHtml;
            });
        } else {
            // Generowanie nagłówka tabeli pucharowej
            let headHtml = `<tr><th>Gracz</th>`;
            matchesPuchar.forEach(m => {
                if(m.id === "zwyciezca") {
                    headHtml += `<th style="color:var(--amber)"><div class="th-match-header">🏆 MISTRZ</div></th>`;
                } else {
                    headHtml += `<th><div class="th-match-header">${m.id}</div></th>`;
                }
            });
            headHtml += `</tr>`;
            thead.innerHTML = headHtml;

            // Wypełnianie wierszy graczy dla rund pucharowych
            existingDatabaseRows.forEach(row => {
                let rowHtml = `<tr><td style="font-weight:bold; color:var(--blue); background:#1a2238;">${row.gracz || "Anonim"}</td>`;
                matchesPuchar.forEach(m => {
                    const pred = row[m.id.toLowerCase()] || "-";
                    let cellClass = "";
                    // Wizualne wyróżnienie typu końcowego mistrza
                    if (m.id === "zwyciezca" && pred !== "-") {
                        cellClass = 'class="cell-winner"';
                    }
                    rowHtml += `<td ${cellClass}>${pred !== "-" ? getFlagAnd3LetterCode(pred) : "-"}</td>`;
                });
                rowHtml += `</tr>`;
                tbody.innerHTML += rowHtml;
            });
        }
        refreshTwemoji();
    }

    function getMatchPoints(prediction, official) {
        if (!prediction || !official || prediction === "-" || official === "") return 0;
        if (prediction.trim() === official.trim()) return 3;

        const pParts = prediction.split(":");
        const oParts = official.split(":");
        if (pParts.length !== 2 || oParts.length !== 2) return 0;

        const pHome = parseInt(pParts[0]), pAway = parseInt(pParts[1]);
        const oHome = parseInt(oParts[0]), oAway = parseInt(oParts[1]);

        if (isNaN(pHome) || NaN(pAway) || NaN(oHome) || NaN(oAway)) return 0;

        const pSign = Math.sign(pHome - pAway);
        const oSign = Math.sign(oHome - oAway);

        if (pSign === oSign) return 1;
        return 0;
    }

    function calculateLeaderboard() {
        const scores = [];

        existingDatabaseRows.forEach(row => {
            let totalPoints = 0;
            let exactCount = 0;
            let trendCount = 0;

            allMatches.forEach(m => {
                if (m.score && m.score !== "") {
                    const pred = row[m.id.toLowerCase()];
                    const pts = getMatchPoints(pred, m.score);
                    totalPoints += pts;
                    if (pts === 3) exactCount++;
                    else if (pts === 1) trendCount++;
                }
            });

            scores.push({
                gracz: row.gracz || "Anonim",
                points: totalPoints,
                exact: exactCount,
                trend: trendCount
            });
        });

        scores.sort((a, b) => b.points - a.points || b.exact - a.exact);

        const lBody = document.getElementById('leaderboard-body');
        lBody.innerHTML = "";

        if(scores.length === 0) {
            lBody.innerHTML = `<tr><td colspan="3">Brak zarejestrowanych graczy w bazie</td></tr>`;
            return;
        }

        scores.forEach((s, index) => {
            lBody.innerHTML += `
                <tr class="leaderboard-row">
                    <td><span class="rank-badge">${index + 1}</span></td>
                    <td style="text-align: left; padding-left: 15px; font-weight:600;">${s.gracz}</td>
                    <td style="color:var(--primary); font-weight:bold;">
                        ${s.points} pkt 
                        <span class="stats-span">(🎯 ${s.exact} | 🏂 ${s.trend})</span>
                    </td>
                </tr>
            `;
        });
    }
</script>
